# 회사 프로필
# 대화에서 점진적으로 축적. 같은 법이라도 업종/규모에 따라 적용이 다르다.
# 사용자가 회사 정보를 공유하면 이 파일을 업데이트한다.
# Migration: 기존 profile.yaml 에 interested_laws / party_position 부재 시
# 자동 누락 처리 (graceful fallback) — 두 필드는 v0.2.2~ 에서 추가됨.

company_name: ""           # 회사명 (비공개 가능)
user_role: ""              # lawyer | legal_ops | business_user | unknown
attorney_contact: ""       # 비법무 사용자의 검토 담당 변호사/법무팀 연락처 (선택)
industry: ""               # 업종 (예: IT, 제조, 식품, 금융)
industry_code: ""           # 한국표준산업분류 코드 (선택)
company_type: ""            # 유형: 주식회사, 유한회사, 개인사업자
listing_status: ""          # 상장 여부: listed, kosdaq, unlisted
employee_count: null        # 직원 수 (법적 의무 기준 분기에 사용)
capital: null               # 자본금 (원)
annual_revenue: null        # 연매출 (원, 하도급법 기준 등)
headquarters: ""            # 본사 소재지
branches: []                # 지점/사업장 소재지

# 규제 관련 속성
has_subcontract: false      # 하도급 관계 여부
handles_personal_data: false  # 개인정보 처리 여부
data_subjects_count: null   # 정보주체 수 (개인정보보호법 기준)
has_overseas_operations: false  # 해외 사업 여부
overseas_countries: []      # 해외 진출국
is_franchise: false         # 가맹사업 여부

# 관심 법령 (v0.2.2~) — 최근 개정 자동 조회 대상
# 비어있으면 응답 후단 append 없음. 값이 있으면 "💡 최근 개정: ..." 한 줄 덧붙임.
# 법령명은 legalize-kr 의 디렉토리명과 일치해야 함 — 띄어쓰기 없음 (SKILL.md "모드 판별" 섹션 참조).
# mismatch 시 "개정 없음" 이 아니라 "조회 실패" 로 표시 (SKILL.md 법령 변경 감지 → 실패 분기).
interested_laws: []         # 예: ["개인정보보호법", "근로기준법", "하도급거래공정화에관한법률"]

# 계약서 검토 시 당사자 위치 (v0.2.2~)
# gap = 계약 상위 당사자 (발주자·위탁자·사용자·수요자)
# eul = 계약 하위 당사자 (공급자·수탁자·근로자·수행자)
# 빈 값이면 양쪽 모두 노출이 기본 (SKILL.md Step 4 / Dim 4 서브체크 2).
#
# 해석 순서 (v0.3.0~):
#   1. per_clause_override[{조항key}] 가 존재 → 그 값 사용 ("" 은 해당 조항만 양쪽 노출 강제)
#   2. per_clause_override 부재 → default 사용 ("" 은 양쪽 노출)
#   {조항key} 는 assets/data/clause_references.yaml top-level clauses.* ID 와 일치해야 함 (graceful skip).
party_position:
  default: ""               # "customer" / "supplier" / "platform" / "gap" / "eul" / "" (불명)
  per_clause_override: {}   # 조항별 override 예: {indemnification: "gap", non_compete: "eul", work_product: ""}

# 계약 검토 playbook (v0.4.0~)
# 한국법 강행규정과 공식 근거가 항상 우선한다. playbook은 협상 선호와 escalation 기준일 뿐
# Source Grade A/B 법령·판례 근거를 대체하지 않는다.
contract_playbook:
  risk_posture: ""          # conservative | moderate | aggressive | ""
  standard_positions:
    liability_cap: ""
    indemnity: ""
    data_protection: ""
    termination: ""
    governing_law_dispute: ""
  acceptable_fallbacks: []  # 예: ["책임한도 12개월 수수료", "DPA 별첨 체결 조건부 수용"]
  never_accept: []          # 예: ["고의·중과실까지 면책", "개인정보 재위탁 무제한 허용"]
  escalation_triggers: []   # 예: ["무제한 책임", "국외이전 고지/동의 누락", "하도급법 적용 가능"]
  seed_documents:
    reviewed_count: 0
    notes: ""

# 메모
notes: ""                   # 기타 특기사항
updated_at: ""              # 마지막 업데이트 일시
