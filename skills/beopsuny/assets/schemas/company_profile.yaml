# 회사 프로필
# 대화에서 점진적으로 축적. 같은 법이라도 업종/규모에 따라 적용이 다르다.
# 사용자가 회사 정보를 공유하면 이 파일을 업데이트한다.

company_name: ""           # 회사명 (비공개 가능)
industry: ""               # 업종 (예: IT, 제조, 식품, 금융)
industry_code: ""           # 한국표준산업분류 코드 (선택)
company_type: ""            # 유형: 주식회사, 유한회사, 개인사업자
listing_status: ""          # 상장 여부: listed, kosdaq, unlisted
employee_count: null        # 직원 수 (법적 의무 기준 분기에 사용)
capital: null               # 자본금 (원)
annual_revenue: null        # 연매출 (원, 하도급법 기준 등)
headquarters: ""            # 본사 소재지
branches: []                # 지점/사업장 소재지

# 규제 관련 속성
has_subcontract: false      # 하도급 관계 여부
handles_personal_data: false  # 개인정보 처리 여부
data_subjects_count: null   # 정보주체 수 (개인정보보호법 기준)
has_overseas_operations: false  # 해외 사업 여부
overseas_countries: []      # 해외 진출국
is_franchise: false         # 가맹사업 여부

# 관심 법령 (v0.2.2~) — 최근 개정 자동 조회 대상
# 비어있으면 응답 후단 append 없음. 값이 있으면 "💡 최근 개정: ..." 한 줄 덧붙임.
# 법령명은 legalize-kr 의 디렉토리명과 일치해야 함 — 띄어쓰기 없음 (SKILL.md "모드 판별" 섹션 참조).
# mismatch 시 "개정 없음" 이 아니라 "조회 실패" 로 표시 (SKILL.md 법령 변경 감지 → 실패 분기).
interested_laws: []         # 예: ["개인정보보호법", "근로기준법", "하도급거래공정화에관한법률"]

# 계약서 검토 시 당사자 위치 (v0.2.2~)
# gap = 계약 상위 당사자 (발주자·위탁자·사용자·수요자)
# eul = 계약 하위 당사자 (공급자·수탁자·근로자·수행자)
# 빈 값이면 양쪽 모두 노출이 기본 (SKILL.md Step 4 / Dim 4 서브체크 2).
party_position:
  default: ""               # "gap" / "eul" / "" (불명)
  per_clause_override: {}   # 조항별 override 예: {indemnification: "gap", non_compete: "eul"}

# 메모
notes: ""                   # 기타 특기사항
updated_at: ""              # 마지막 업데이트 일시
