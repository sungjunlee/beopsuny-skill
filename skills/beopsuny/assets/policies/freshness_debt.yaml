name: "Freshness debt registry"
description: "Bundled assets and reference docs with stale-prone facts that must stay triage-only until refreshed."
tracked_issue: "https://github.com/sungjunlee/beopsuny-skill/issues/101"
policy:
  status_values:
    - stale_registered
  allowed_runtime_use: "triage_only"
  required_before_legal_conclusion: "live legal research against official or primary sources"
  forbidden_runtime_use: "Do not present registered stale values from assets or references as current legal obligations, thresholds, deadlines, fees, forms, source counts, treaty counts, or filing requirements."
  retirement_rule: "Remove an asset or reference from this registry only after its bundled source has been reverified, maintenance.next_review or registry next_review has been advanced, and the verification notes identify the source family checked."
  revalidation_record_required: "Before retiring an asset/reference or advancing maintenance.next_review, record the review using the fields in assets/schemas/freshness_revalidation.yaml."
assets:
  - path: "skills/beopsuny/assets/data/clause_references.yaml"
    status: "stale_registered"
    next_review: "2026-10"
    risk: "contract clause mappings still include unmapped rates, payment deadlines, penalty caps, SLA examples, and statutory threshold hints that were not fully covered by the 2026-07-03 local mirror refresh"
    allowed_use: "contract clause issue-spotting triage only"
    verification_required: "confirm current statutes, enforcement decrees, court sources, and competent-agency guidance before stating remaining clause obligations, rates, deadlines, caps, or thresholds"
    retire_when: "all remaining volatile clause-reference values are refreshed from official sources or converted to live-check-only hints and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/fair_trade.yaml"
    status: "stale_registered"
    next_review: "2026-10"
    risk: "statutory merger thresholds and the subcontracting 60-day payment deadline were refreshed from the local legalize-kr mirror, but KFTC notice rates, surcharge details, review practice, and current guidance remain unverified"
    allowed_use: "fair-trade research question triage only"
    verification_required: "confirm current law, enforcement decree, KFTC notices, 심결/판례, and current guidance before stating obligations, rates, surcharge standards, or filing timing"
    retire_when: "KFTC notice rates, surcharge standards, and current guidance are refreshed or converted to live-check-only hints and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/food_business.yaml"
    status: "stale_registered"
    next_review: "2026-10"
    risk: "Food Sanitation Act hooks were refreshed from the local legalize-kr mirror, but HACCP scope, food labeling notices, import checks, and health-functional-food criteria remain notice-dependent and unverified"
    allowed_use: "food-business triage only"
    verification_required: "confirm current MFDS, Food Safety Korea, law.go.kr, and relevant notices before answering"
    retire_when: "MFDS notice-dependent HACCP, labeling, import, and health-functional-food details are refreshed or converted to live-check-only hints and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/healthcare.yaml"
    status: "stale_registered"
    next_review: "2026-10"
    risk: "Medical Devices Act and Medical Service Act article references were refreshed, but MFDS item classification, digital therapeutics guidance, and patient-facing telemedicine guidance remain unverified"
    allowed_use: "healthcare-business triage only"
    verification_required: "confirm current MFDS, MOHW, law.go.kr, and relevant notices before answering"
    retire_when: "MFDS classification/guidance and MOHW patient telemedicine guidance are refreshed or converted to live-check-only hints and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/labor_hr.yaml"
    status: "stale_registered"
    next_review: "2026-10"
    risk: "disability-employment statutory scope and minimum-wage statutory process were refreshed, but annual minimum-wage amount, disability employment rate schedule, and HR agency filing duties remain notice-dependent or only partially verified"
    allowed_use: "labor and HR triage only"
    verification_required: "confirm current labor statutes, enforcement decrees, MOEL notices, and annual rate announcements before answering"
    retire_when: "annual rate announcements, disability-employment rate schedule, and HR filing deadlines are refreshed or converted to live-check-only hints and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/privacy_compliance.yaml"
    status: "stale_registered"
    next_review: "2026-10"
    risk: "PIPA/PIPA Enforcement Decree overseas-transfer, breach, and surcharge anchors were refreshed, but PIPC safety-measure notice thresholds and guidance remain unverified"
    allowed_use: "privacy issue triage only"
    verification_required: "confirm current PIPA, enforcement decree, PIPC guidance, and notices before stating obligations"
    retire_when: "PIPC notice-dependent safety-measure thresholds and current guidance are refreshed or converted to live-check-only hints and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/serious_accident.yaml"
    status: "stale_registered"
    next_review: "2026-10"
    risk: "SAPA coverage, penalty, and dedicated-organization statutory thresholds were refreshed, but MOEL guidance, recent case law, and sector-specific implementation practice remain unverified"
    allowed_use: "serious-accident issue triage only"
    verification_required: "confirm current statutes, enforcement decrees, MOEL guidance, and recent case law before answering"
    retire_when: "MOEL guidance, recent case law, and sector implementation practice are refreshed or converted to live-check-only hints and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/startup.yaml"
    status: "stale_registered"
    next_review: "2026-10"
    risk: "company formation and business-registration statutory anchors were refreshed, but four-insurance filing windows and sector-permit submission details remain agency-dependent and unverified"
    allowed_use: "startup formation triage only"
    verification_required: "confirm current registry, tax, employment-insurance, and permit requirements through official sources before answering"
    retire_when: "four-insurance agency filing windows and sector-permit details are refreshed or converted to live-check-only hints and maintenance.next_review is advanced"
  - path: "skills/beopsuny/references/international_guide.md"
    status: "stale_registered"
    next_review: "2026-10-31"
    risk: "enterprise-combination thresholds and EU CSDDD phase-in dates were partially refreshed, but cross-border thresholds, treaty/source counts, technology-control lists, agency forms, and filing deadlines can change independently of this reference"
    allowed_use: "international expansion issue-spotting triage only"
    verification_required: "confirm current law.go.kr, competent ministry, NTS, MOFA, KFTC, PIPC, EU official sources, and other primary sources before stating current thresholds, counts, filing duties, or deadlines"
    retire_when: "remaining dated volatile reference claims are removed, reframed as live-check hints, or revalidated with official-source notes"
