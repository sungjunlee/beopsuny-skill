    retire_when: "startup formation references are refreshed and maintenance.next_review is advanced"
  - path: "skills/beopsuny/references/international_guide.md"
    status: "stale_registered"
    next_review: "2026-05-31"
    risk: "cross-border thresholds, treaty/source counts, CSDDD phase-in dates, technology-control lists, and filing deadlines can change independently of this reference"
    allowed_use: "international expansion issue-spotting triage only"
    verification_required: "confirm current law.go.kr, competent ministry, NTS, MOFA, KFTC, PIPC, EU official sources, and other primary sources before stating current thresholds, counts, filing duties, or deadlines"
    retire_when: "dated volatile reference claims are removed, reframed as live-check hints, or revalidated with official-source notes"
