name: "Freshness debt registry"
description: "Bundled assets and reference docs with stale-prone facts that must stay triage-only until refreshed."
tracked_issue: "https://github.com/sungjunlee/beopsuny-skill/issues/101"
policy:
  status_values:
    - stale_registered
  allowed_runtime_use: "triage_only"
  required_before_legal_conclusion: "live legal research against official or primary sources"
  forbidden_runtime_use: "Do not present registered stale values from assets or references as current legal obligations, thresholds, deadlines, fees, forms, source counts, treaty counts, or filing requirements."
  retirement_rule: "Remove an asset or reference from this registry only after its bundled source has been reverified, maintenance.next_review or registry next_review has been advanced, and the verification notes identify the source family checked."
  revalidation_record_required: "Before retiring an asset/reference or advancing maintenance.next_review, record the review using the fields in assets/schemas/freshness_revalidation.yaml."
assets:
  - path: "skills/beopsuny/assets/data/clause_references.yaml"
    status: "stale_registered"
    next_review: "2026-04"
    risk: "contract clause mappings include legal rates, payment deadlines, penalty caps, SLA examples, and statutory threshold hints that may be outdated"
    allowed_use: "contract clause issue-spotting triage only"
    verification_required: "confirm current statutes, enforcement decrees, court sources, and competent-agency guidance before stating clause obligations, rates, deadlines, caps, or thresholds"
    retire_when: "volatile clause-reference values are refreshed or converted to live-check-only hints and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/contract_review.yaml"
    status: "stale_registered"
    next_review: "2026-01"
    risk: "lease, standard terms, and mandatory provision references may be outdated"
    allowed_use: "contract issue-spotting triage only"
    verification_required: "confirm any cited law, mandatory rule, period, cap, or threshold through current primary sources"
    retire_when: "volatile contract-law references are refreshed and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/fair_trade.yaml"
    status: "stale_registered"
    next_review: "2026-01"
    risk: "fine standards, merger filing thresholds, subcontracting deadlines, and enforcement guidance may have changed"
    allowed_use: "fair-trade research question triage only"
    verification_required: "confirm current law, enforcement decree, KFTC notice, and current guidance before stating obligations"
    retire_when: "KFTC-sensitive references are refreshed and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/food_business.yaml"
    status: "stale_registered"
    next_review: "2026-03"
    risk: "HACCP scope, food labeling standards, import checks, and health-functional-food criteria may have changed"
    allowed_use: "food-business triage only"
    verification_required: "confirm current MFDS, Food Safety Korea, law.go.kr, and relevant notices before answering"
    retire_when: "food regulatory references are refreshed and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/healthcare.yaml"
    status: "stale_registered"
    next_review: "2026-03"
    risk: "medical device classification, digital health rules, and telemedicine guidance may have changed"
    allowed_use: "healthcare-business triage only"
    verification_required: "confirm current MFDS, MOHW, law.go.kr, and relevant notices before answering"
    retire_when: "healthcare regulatory references are refreshed and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/investment_due_diligence.yaml"
    status: "stale_registered"
    next_review: "2026-01"
    risk: "merger filing thresholds, foreign investment rules, and DD issue framing may be outdated"
    allowed_use: "investment or M&A issue-spotting triage only"
    verification_required: "confirm current statutes, enforcement decrees, and agency guidance before stating filing or approval duties"
    retire_when: "transaction-threshold references are refreshed and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/labor_hr.yaml"
    status: "stale_registered"
    next_review: "2026-01"
    risk: "minimum wage, disability employment rates, employee thresholds, and HR filing duties may have changed"
    allowed_use: "labor and HR triage only"
    verification_required: "confirm current labor statutes, enforcement decrees, MOEL notices, and annual rate announcements before answering"
    retire_when: "labor threshold and annual-rate references are refreshed and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/privacy_compliance.yaml"
