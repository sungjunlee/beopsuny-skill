    risk: "coverage, safety-health obligations, enforcement practice, and penalty framing may have changed"
    allowed_use: "serious-accident issue triage only"
    verification_required: "confirm current statutes, enforcement decrees, MOEL guidance, and recent case law before answering"
    retire_when: "serious-accident references are refreshed and maintenance.next_review is advanced"
  - path: "skills/beopsuny/assets/policies/checklists/startup.yaml"
    status: "stale_registered"
    next_review: "2026-01"
    risk: "registration deadlines, four-insurance filing windows, and industry-permit links may have changed"
