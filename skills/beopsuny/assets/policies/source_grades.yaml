# ============================================================
# Source Authority Labels — 법령/판례/2차 소스 권위 라벨 체계
# ============================================================
# 공개 출력에서는 A/B/C/D 점수형 등급을 쓰지 않는다.
# 사용자가 바로 이해할 수 있는 출처 권위 라벨과 기존 verification status를 병기한다.
#
# 사용 시점:
#   1. Claude가 인용할 소스를 찾았을 때 → source_authority label 부여
#   2. 출력에 [공식 원문] / [공식 실무자료] / [해설/의견] / [참고 제외] 표기
#   3. 기존 [VERIFIED] / [UNVERIFIED] / [INSUFFICIENT] 태그와 병기
#   4. 핵심 결론은 공식 원문 또는 공식 실무자료로 뒷받침
#
# 설계 원칙:
#   - 라벨 업그레이드 금지 (upgrade_forbidden: true)
#   - stale, paraphrase, 비공식 번역, 출처 세탁은 downgrade_triggers 참조
#   - 참고 제외 자료는 RAG/요약에서 제외, 정황 파악용으로만 가능
# ============================================================

version: "2.0.0"
last_updated: "2026-06-03"

source_classes:
  official_primary:
    label: "공식 원문"
    description: "법령 원문, 시행령·시행규칙, 행정규칙 원문, 판례 원문, 법제처 공식 해석례, 처분·의결서 원문"
    trust_level: "authoritative"
    use_allowed: "conclusion_basis"
    can_be_sole_basis: true
    examples:
      - "개인정보 보호법 제15조 (law.go.kr)"
      - "대법원 2022다12345 판결 (glaw.scourt.go.kr)"
      - "법제처 법령해석례"
      - "규제기관(공정위·금감원·식약처 등) 심결·처분 원문"
      - "행정규칙 원문 (고시·훈령·예규, law.go.kr)"

  official_primary_lower_court:
    label: "공식 원문: 하급심"
    description: "하급심 판례 원문. 공식 원문이지만 상급심 변경 가능성을 표시한다."
    trust_level: "authoritative_with_caveat"
    use_allowed: "conclusion_basis_with_caveat"
    can_be_sole_basis: true
    requires_note: "상급심 변경 가능성을 표시하고, 가능한 경우 대법원 판례와 교차검증"
    examples:
      - "서울고등법원·지방법원 판결 원문"

  official_practice_material:
    label: "공식 실무자료"
    description: "규제기관 가이드라인·해설서·FAQ·보도자료, 정부 공식 안내"
    trust_level: "official_reference"
    use_allowed: "support_or_context"
    can_be_sole_basis: false
    requires_note: "법률 결론은 가능한 경우 공식 원문과 분리해 표시"
    examples:
      - "개인정보보호위원회 가이드라인·해설서"
      - "금융감독원·식약처 보도자료"
      - "정부 공식 해설집"

  official_practice_pending:
    label: "공식 실무자료: 미확정"
    description: "계류 의안, 입법예고, 개정안처럼 시행 여부가 아직 확정되지 않은 공식 자료"
    trust_level: "official_pending"
    use_allowed: "future_or_policy_context"
    can_be_sole_basis: false
    requires_note: "현재 적용법과 예정·미확정 내용을 분리"
    examples:
      - "국회 계류 의안"
      - "입법예고"

  commentary:
    label: "해설/의견"
    description: "로펌 뉴스레터, 학술 논문, 법률 매체 해설, 개별 전문가 코멘터리"
    trust_level: "reference"
    use_allowed: "triage_or_editorial"
    can_be_sole_basis: false
    requires_tag: "[EDITORIAL]"
    examples:
      - "김장 법률사무소·세종 등 로펌 뉴스레터"
      - "법학논집·학술지 논문"
      - "법률신문 해설 기사"
      - "개별 변호사 블로그·칼럼"

  excluded:
    label: "참고 제외"
    description: "일반 뉴스, AI 생성 요약, 위키, SNS, 비인증 번역본, 익명·비전문 블로그"
    trust_level: "excluded"
    use_allowed: "background_only"
    can_be_sole_basis: false
    note: "RAG·요약에 포함하지 않음. 참고용으로만 사용 가능하며 인용 시 [참고 제외] 명시."
    examples:
      - "일반 언론 기사 (법률 해설 아님)"
      - "AI 생성 요약·Wikipedia"
      - "SNS·익명 블로그"
      - "비공식 번역본"

rules:
  upgrade_forbidden: true

  downgrade_triggers:
    - trigger: "소스가 오래됨 (개정 반영 안 됨)"
      action: "tag: [STALE], 결론 근거에서 제외 또는 결론 유보"
      example: "2020년 로펌 뉴스레터가 2023년 개정 후 조문 번호를 인용"

    - trigger: "2차 소스가 1차 소스 paraphrase (핀포인트 인용 없음)"
      action: "해설/의견 유지, 원본 재인용 요구"
      example: "뉴스 기사가 '법원 판결에 따르면'이라고만 하고 사건번호 없음"

    - trigger: "비공식 번역본"
      action: "참고 제외 또는 보조 자료, 한국어 원문 병기"
      example: "영문 번역된 한국 법령 → 반드시 한국어 원문 함께"

    - trigger: "출처 세탁 (2차 소스가 1차인 척)"
      action: "해설/의견 또는 참고 제외로 낮춤"
      example: "로펌 요약을 '법제처 해석'으로 표기"

  primary_authority_rule: |
    모든 핵심 결론은 공식 원문 또는 공식 실무자료로 뒷받침되어야 한다.
    해설/의견 단독으로는 결론 불가 — 반드시 [EDITORIAL] 태그로 "이것은 해설·의견"임을 명시.
    참고 제외 자료는 결론의 근거로 쓰지 않는다. 참고 컨텍스트용으로만 인용 가능.

  existing_tag_mapping:
    "[VERIFIED]":
      meaning: "대상 특정, 원문 대조, 최신성 표시, provenance 표시 완료"
      use_with: "모든 출처 권위 라벨"

    "[UNVERIFIED]":
      meaning: "부분 매칭 또는 원문 미확인"
      use_with: "모든 출처 권위 라벨"

    "[INSUFFICIENT]":
      meaning: "근거 부족, 결론 유보"
      use_with: "라벨 생략 가능"

    "[CONTRADICTED]":
      meaning: "소스 간 모순 — 상위 공식 source를 우선하되 모순 자체를 사용자에게 노출"
      use_with: "모든 출처 권위 라벨"

    "[STALE]":
      meaning: "소스 시점이 오래되어 현행성 의심"
      use_with: "모든 출처 권위 라벨"

    "[EDITORIAL]":
      meaning: "해설·의견으로, 결론의 단독 근거 아님"
      use_with: "해설/의견"

default_labels:
  "legalize-kr (로컬 법령 Markdown)":
    source_class: official_primary
    label: "공식 원문"
    rationale: "법제처 공식 법령 원문의 Markdown 변환본"

  "precedent-kr (로컬 대법원 판례)":
    source_class: official_primary
    label: "공식 원문"
    rationale: "대법원 종합법률정보의 판례 원문"

  "precedent-kr (로컬 하급심 판례)":
    source_class: official_primary_lower_court
    label: "공식 원문: 하급심"
    rationale: "하급심 판례는 상급심에 의해 변경 가능"

  "법망 API — 행정규칙 (type=admrul)":
    source_class: official_primary
    label: "공식 원문"
    rationale: "고시·훈령·예규 공식 원문"

  "법망 API — 해석례 (type=expc)":
    source_class: official_primary
    label: "공식 원문"
    rationale: "법제처 공식 유권해석"

  "법망 API — 의안 (type=bill)":
    source_class: official_practice_pending
    label: "공식 실무자료: 미확정"
    rationale: "계류 의안은 확정 법령이 아님 — 시행 여부 미확정"

  "법망 API — 판례 (대법원)":
    source_class: official_primary
    label: "공식 원문"
    rationale: "대법원 종합법률정보 데이터의 API 래핑 — 공식 판례 원문"

  "법망 API — 판례 (하급심)":
    source_class: official_primary_lower_court
    label: "공식 원문: 하급심"
    rationale: "하급심 판례는 상급심에 의해 변경 가능"

  "korean-law-mcp (법제처 API 래핑)":
    source_class: official_primary
    label: "공식 원문"
    rationale: "법제처 공식 API 기반 — 헌재 결정, 행정심판, 자치법규 포함"

  "law.go.kr":
    source_class: official_primary
    label: "공식 원문"
    rationale: "법령/판례 링크 — 공식 원문 URL"

  "glaw.scourt.go.kr":
    source_class: official_primary
    label: "공식 원문"
    rationale: "대법원 종합법률정보 — 공식 판례 원문"

  "WebSearch — 정부·규제기관 공식 도메인":
    source_class: official_practice_material
    label: "공식 실무자료"
    rationale: "go.kr 도메인의 공식 자료 — 법률 결론은 공식 원문과 분리 표시"
    domains_examples: ["moel.go.kr", "ftc.go.kr", "pipc.go.kr", "fsc.go.kr"]

  "WebSearch — 로펌·학술·법률매체":
    source_class: commentary
    label: "해설/의견"
    rationale: "단일 2차 소스 — [EDITORIAL] 태그 필수"
    downgrade_to_excluded_when:
      - "AI 생성 요약임이 명시됨"
      - "원문 인용 없이 해설만"
      - "익명·비인증 블로그"

  "WebSearch — 일반 뉴스·블로그·SNS":
    source_class: excluded
    label: "참고 제외"
    rationale: "결론 근거 아님. 정황 파악용으로만."

output_format:
  authority_label_position: "인용 소스의 첫 줄 맨 앞"
  combined_with_verification: "[출처 권위 라벨] [VERIFIED/UNVERIFIED/INSUFFICIENT] 순"
  example_verified: |
    ## 민법 제750조 (불법행위의 내용)
    **[공식 원문] [VERIFIED]** — legalize-kr 로컬

    > 고의 또는 과실로 인한 위법행위로 타인에게 손해를 가한 자는...
  example_editorial: |
    **[해설/의견] [EDITORIAL]** 김장 법률사무소 뉴스레터 (2024-10)

    > "실무상 ~ 해석된다"
  example_insufficient: |
    **[INSUFFICIENT]** — 해당 조문의 원문 미확인

    확인 필요: law.go.kr에서 직접 조회 권장
