# ============================================================
# Source Grading A/B/C/D — 법령/판례/2차 소스 신뢰도 등급 체계
# ============================================================
# kipeum86/PIPA-expert 의 config/source-grades.json 패턴을
# 한국 법령 도메인에 맞게 YAML로 변환한 정책 파일.
#
# 사용 시점:
#   1. Claude가 인용할 소스를 찾았을 때 → grade 부여
#   2. 출력에 [Grade A/B/C/D] 태그 표기
#   3. 기존 [VERIFIED] / [UNVERIFIED] / [INSUFFICIENT] 태그와 병기
#   4. 핵심 결론은 반드시 A 또는 B primary 소스로 뒷받침
#
# 설계 원칙:
#   - 업그레이드 금지 (upgrade_forbidden: true)
#   - 다운그레이드 트리거는 downgrade_triggers 참조
#   - Grade D는 RAG/요약에서 제외, 참고용으로만 가능
# ============================================================

version: "1.0.0"
last_updated: "2026-04-12"

grades:
  A:
    label: "공식 1차 소스"
    description: "법령 원문, 대법원·헌법재판소 판례, 법제처 공식 유권해석"
    trust_level: "authoritative"
    can_be_sole_basis: true
    examples:
      - "개인정보 보호법 제15조 (law.go.kr)"
      - "대법원 2022다12345 판결 (glaw.scourt.go.kr)"
      - "법제처 법령해석례"
      - "규제기관(공정위·금감원·식약처 등) 유권해석·심결 원문"
      - "행정규칙 원문 (고시·훈령·예규, law.go.kr)"

  B:
    label: "교차검증된 2차 소스"
    description: "하급심 판례, 처분례, 규제기관 가이드라인·보도자료"
    trust_level: "verified"
    can_be_sole_basis: true
    requires_note: "Grade A 소스로 교차검증 권장"
    examples:
      - "서울고등법원·지방법원 판결"
      - "공정거래위원회 처분·의결서"
      - "개인정보보호위원회 가이드라인·해설서"
      - "금융감독원·식약처 보도자료"
      - "정부 공식 해설집"

  C:
    label: "단일 2차 소스"
    description: "로펌 뉴스레터, 학술 논문, 개별 전문가 코멘터리"
    trust_level: "reference"
    can_be_sole_basis: false
    requires_tag: "[EDITORIAL: Single-source, Grade C]"
    examples:
      - "김장 법률사무소·세종 등 로펌 뉴스레터"
      - "법학논집·학술지 논문"
      - "법률신문 해설 기사"
      - "개별 변호사 블로그·칼럼"

  D:
    label: "제외"
    description: "일반 뉴스, AI 생성 요약, 위키, SNS, 비인증 번역본"
    trust_level: "excluded"
    can_be_sole_basis: false
    note: "RAG·요약에 포함하지 않음. 참고용으로만 사용 가능하며 인용 시 [Grade D] 명시."
    examples:
      - "일반 언론 기사 (법률 해설 아님)"
      - "AI 생성 요약·Wikipedia"
      - "SNS·블로그 (전문가 인증 없음)"
      - "비공식 번역본"

rules:
  # 등급은 내재 속성 — 절대 올라갈 수 없다
  upgrade_forbidden: true

  # 다운그레이드 트리거
  downgrade_triggers:
    - trigger: "소스가 오래됨 (개정 반영 안 됨)"
      action: "tag: [STALE], grade 1단계 하향"
      example: "2020년 로펌 뉴스레터가 2023년 개정 후 조문 번호를 인용"

    - trigger: "2차 소스가 1차 소스 paraphrase (핀포인트 인용 없음)"
      action: "downgrade to C, 원본 재인용 요구"
      example: "뉴스 기사가 '법원 판결에 따르면'이라고만 하고 사건번호 없음"

    - trigger: "비공식 번역본"
      action: "B max, 원문 언어 병기"
      example: "영문 번역된 한국 법령 → 반드시 한국어 원문 함께"

    - trigger: "출처 세탁 (2차 소스가 1차인 척)"
      action: "강제 C"
      example: "로펌 요약을 '법제처 해석'으로 표기"

  # 핵심 결론 제약
  primary_authority_rule: |
    모든 핵심 결론은 Grade A 또는 Grade B primary 소스로 뒷받침되어야 한다.
    Grade C 단독으로는 결론 불가 — 반드시 [EDITORIAL] 태그로 "이것은 해설·의견"임을 명시.
    Grade D는 결론의 근거로 쓰지 않는다. 참고 컨텍스트용도로만 인용 가능.

  # 기존 법순이 태그와의 매핑
  existing_tag_mapping:
    "[VERIFIED]":
      meaning: "Grade A 소스로 조문/판례 원문 매칭 완료"
      use_with: "Grade A"

    "[UNVERIFIED]":
      meaning: "Grade B~C만 확보, 또는 부분 매칭 (원문 미확인)"
      use_with: "Grade B 또는 Grade C"

    "[INSUFFICIENT]":
      meaning: "근거 부족, 결론 유보"
      use_with: "등급 부여 불가 시 사용"

    "[CONTRADICTED]":
      meaning: "소스 간 모순 — 상위 등급 소스를 우선, 모순 자체를 사용자에게 노출"
      use_with: "모든 등급 (모순 발생 시)"

    "[STALE]":
      meaning: "소스 시점이 오래되어 현행성 의심"
      use_with: "모든 등급 (다운그레이드와 함께)"

    "[EDITORIAL]":
      meaning: "해설·의견으로, 결론의 단독 근거 아님"
      use_with: "Grade C 단독 인용 시 필수"

# ============================================================
# 소스별 기본 등급 매핑 (SKILL.md 데이터 소스 섹션과 연동)
# ============================================================
default_grades:
  # Full 모드 로컬 데이터
  "legalize-kr (로컬 법령 Markdown)":
    grade: A
    rationale: "법제처 공식 법령 원문의 Markdown 변환본 (6,907 파일)"

  "precedent-kr (로컬 대법원 판례)":
    grade: A
    rationale: "대법원 종합법률정보의 판례 원문"

  "precedent-kr (로컬 하급심 판례)":
    grade: B
    rationale: "하급심 판례는 상급심에 의해 변경 가능 — 교차검증 권장"

  # 법망 API (무인증)
  "법망 API — 행정규칙 (type=admrul)":
    grade: A
    rationale: "고시·훈령·예규 공식 원문"

  "법망 API — 해석례 (type=expc)":
    grade: A
    rationale: "법제처 공식 유권해석"

  "법망 API — 의안 (type=bill)":
    grade: B
    rationale: "계류 의안은 확정 법령이 아님 — 시행 여부 미확정"

  "법망 API — 판례 검색":
    grade: "A 또는 B"
    rationale: "대법원은 A, 하급심은 B"

  # korean-law-mcp (OC 코드)
  "korean-law-mcp (법제처 API 래핑)":
    grade: A
    rationale: "법제처 공식 API 기반 — 헌재 결정, 행정심판, 자치법규 포함"

  # 링크 제공용
  "law.go.kr":
    grade: A
    rationale: "법령/판례 링크 — 공식 원문 URL"

  "glaw.scourt.go.kr":
    grade: A
    rationale: "대법원 종합법률정보 — 공식 판례 원문"

  # WebSearch (Lite 모드 백업)
  "WebSearch — 정부·규제기관 공식 도메인":
    grade: B
    rationale: "go.kr 도메인의 공식 자료 — A 소스로 교차검증 권장"
    domains_examples: ["moel.go.kr", "ftc.go.kr", "pipc.go.kr", "fsc.go.kr"]

  "WebSearch — 로펌·학술·법률매체":
    grade: C
    rationale: "단일 2차 소스 — [EDITORIAL] 태그 필수"
    downgrade_to_D_when:
      - "AI 생성 요약임이 명시됨"
      - "원문 인용 없이 해설만"
      - "익명·비인증 블로그"

  "WebSearch — 일반 뉴스·블로그·SNS":
    grade: D
    rationale: "결론 근거 아님. 정황 파악용으로만."

# ============================================================
# 출력 포맷 규칙 (Claude가 따라야 하는 형식)
# ============================================================
output_format:
  grade_tag_position: "인용 소스의 첫 줄 맨 앞"
  combined_with_verification: "[Grade X] [VERIFIED/UNVERIFIED/INSUFFICIENT] 순"
  example_verified: |
    ## 민법 제750조 (불법행위의 내용)
    **[Grade A] [VERIFIED]** — legalize-kr 로컬

    > 고의 또는 과실로 인한 위법행위로 타인에게 손해를 가한 자는...
  example_editorial: |
    **[Grade C]** 김장 법률사무소 뉴스레터 (2024-10)
    [EDITORIAL: Single-source, Grade C]

    > "실무상 ~ 해석된다"
  example_insufficient: |
    **[INSUFFICIENT]** — 해당 조문의 원문 미확인

    확인 필요: law.go.kr에서 직접 조회 권장
