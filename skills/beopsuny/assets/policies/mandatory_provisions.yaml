# ============================================================
# 한국 강행규정 후보 인덱스 (Mandatory Provision Candidates)
# ============================================================
# SKILL.md Dim 4 서브체크 1 "alt_wording_hint 방향이 한국 강행규정 하에서
# 유효 가능한 범위인가" 판정 시 issue spotting 후보로 참조한다.
#
# 이 파일은 결론 근거가 아니다. 각 항목의 법률명·조문·시행일·강행규정성은
# 답변 전에 current primary source(law.go.kr, 공식 API, 소관 기관 원문)로
# 다시 확인해야 한다.
#
# 배경:
#   v0.2.1 에서 SKILL.md Dim 4 서브체크 1 에 6개 강행규정 예시가 인라인 나열돼
#   "전수 vs 샘플" 모호했음 (#28 L5). 실무에서 강행규정은 훨씬 많음 — 공정거래법,
#   하도급법, 근로기준법 다수 조항. 후보 인덱스로 외화하여 누락 방지 seed를 고정.
#
# 원칙 (SKILL.md 핵심 원칙 4 연동):
#   - 법률명 + 조문 필수, 추정 금지
#   - 시행일 확인 — 시행 전 조문은 "시행 예정" 으로 표시 (enforced_at null 가능)
#   - 환각 방지 — 확실하지 않은 엔트리는 포함하지 않음
#
# 스키마:
#   provisions:
#     - law: {법률명, 띄어쓰기 legalize-kr 디렉토리 규칙과 일치}
#       article: {조문 번호, "제N조" 또는 "제N조의M"}
#       clause_types: [{조항 유형 영문 key — clause_references.yaml top-level 과 느슨히 매칭}]
#       note: {강행규정 성격 한 줄 요약 — paraphrase 아닌 원문 핵심}
#       enforced_at: {YYYY-MM-DD — 최근 개정/신설 시행일. null 이면 "법령 원제정 이후
#                     실질적 변경 없이 상시 시행 중" 으로 간주. 불확실하면 null 대신 "unknown" 금지 —
#                     실제 date 를 확정하거나 null (= 상시 시행 중) 둘 중 하나}
# ============================================================

version: "1.0.0"
last_updated: "2026-04-12"

# ------------------------------------------------------------
# 1. 약관·계약 일반 (v0.2.1 인라인 → 외화)
# ------------------------------------------------------------
provisions:
  - law: "약관의 규제에 관한 법률"
    article: "제7조"
    clause_types: [indemnification, limitation_of_liability, exclusion_of_damages]
    note: "고의/중과실 면책 조항의 효력 제한 가능성 검토 — 경과실 면책 범위는 현행 조문/판례 확인"
    enforced_at: null

  - law: "민법"
    article: "제103조"
    clause_types: [indemnification, non_compete, exclusivity]
    note: "공서양속 위반 가능성이 있는 조항 검토 — 효력 판단은 현행 조문/판례 확인"
    enforced_at: null

  - law: "민법"
    article: "제393조"
    clause_types: [limitation_of_liability, exclusion_of_damages]
    note: "통상손해/특별손해 구분 및 결과적 손해 전면 배제 위험 검토 — 현행 조문/판례 확인"
    enforced_at: null

  - law: "민법"
    article: "제398조"
    clause_types: [liquidated_damages, limitation_of_liability]
    note: "손해배상 예정액은 부당히 과다하면 법원이 감액 — 과다 위약금 조항은 감액 대상"
    enforced_at: null

