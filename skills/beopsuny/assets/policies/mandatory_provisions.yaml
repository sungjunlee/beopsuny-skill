    note: "하도급 서면 발급 쟁점 검토 — 발급 시기와 위반 여부는 현행 조문/KFTC 지침 확인"
    enforced_at: null

  - law: "하도급거래공정화에관한법률"
    article: "제13조"
    clause_types: [payment_terms]
    note: "하도급 대금 지급기한과 초과 지급기일 조항의 효력 쟁점 검토 — 현행 조문/KFTC 지침 확인"
    enforced_at: null

