    note: "직무발명 승계와 정당한 보상 쟁점 검토 — 보상 포기 조항의 효력은 현행 조문/판례 확인"
    enforced_at: null

  - law: "저작권법"
    article: "제9조"
    clause_types: [work_product, intellectual_property]
    note: "업무상저작물은 법인 명의 공표 등 4요건 충족 시 법인이 저작자. 외주 계약은 별도 정함 필요"
    enforced_at: null

  - law: "저작권법"
    article: "제14조"
    clause_types: [invention_assignment, work_product, intellectual_property]
    note: "저작인격권 일신전속성과 양도 조항 쟁점 검토 — 효력은 현행 조문/판례 확인"
    enforced_at: null

  # ------------------------------------------------------------
  # 3. 개인정보보호 (v0.2.1 인라인 → 외화)
  # ------------------------------------------------------------
  - law: "개인정보보호법"
    article: "제26조"
    clause_types: [data_processing]
    note: "업무 위탁 시 문서 명시·재위탁 제한·관리감독 쟁점 검토 — 현행 조문/PIPC 안내 확인"
    enforced_at: null

  - law: "개인정보보호법"
    article: "제28조의8"
    clause_types: [data_processing]
    note: "개인정보 국외이전 동의·표준계약서 등 요건 쟁점 검토 — 효력과 시행일은 현행 조문/PIPC 안내 확인"
    enforced_at: "2023-09-15"

