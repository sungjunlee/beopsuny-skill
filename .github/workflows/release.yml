name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate skill document contracts
        run: python tests/validate_skill_contracts.py

      - name: Evaluate router guardrail outputs
        run: python tests/evaluate_scenario_outputs.py

      - name: Test forward eval harness
        run: python -m unittest tests/test_forward_eval_harness.py tests/test_knowledge_manifest_ingest.py

      - name: Compile test harnesses
        run: python -m py_compile tests/validate_skill_contracts.py tests/evaluate_scenario_outputs.py tests/forward_eval_harness.py skills/beopsuny/assets/tools/knowledge_manifest_ingest.py tests/test_knowledge_manifest_ingest.py

      - name: Verify release tag matches plugin metadata
        run: |
          export TAG_VERSION="${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import json
          import os
          import sys

          tag_version = os.environ["TAG_VERSION"]
          with open(".claude-plugin/plugin.json", encoding="utf-8") as handle:
              plugin_version = json.load(handle)["version"]
          with open(".claude-plugin/marketplace.json", encoding="utf-8") as handle:
              marketplace_version = json.load(handle)["plugins"][0]["version"]
          if tag_version != plugin_version or tag_version != marketplace_version:
              print(
                  "version mismatch: "
                  f"tag={tag_version} plugin={plugin_version} marketplace={marketplace_version}",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Create release zips
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"

          # 1. Skill zip — ~/.claude/skills/ 에 풀면 바로 동작
          #    beopsuny/SKILL.md, beopsuny/assets/, beopsuny/references/
          mkdir -p dist/beopsuny
          cp -r skills/beopsuny/* dist/beopsuny/
          cp README.md dist/beopsuny/
          cp LICENSE dist/beopsuny/
          SKILL_ZIP="beopsuny-skill-${VERSION}.zip"
          (cd dist && zip -r "../${SKILL_ZIP}" beopsuny/)

          # 2. Full zip — 레포 전체 (개발자용)
          FULL_ZIP="beopsuny-skill-full-${VERSION}.zip"
          zip -r "$FULL_ZIP" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "dist/*"

          echo "SKILL_ZIP=$SKILL_ZIP" >> $GITHUB_ENV
          echo "FULL_ZIP=$FULL_ZIP" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.SKILL_ZIP }}
            ${{ env.FULL_ZIP }}
          body: |
            ## 설치

            ### 방법 1: Skill zip (권장)
            `beopsuny-skill-${{ github.ref_name }}.zip`을 받아서 `~/.claude/skills/`에 압축 해제:
            ```bash
            unzip beopsuny-skill-${{ github.ref_name }}.zip -d ~/.claude/skills/
            ```
            `~/.claude/skills/beopsuny/SKILL.md`가 생기면 성공.

            ### 방법 2: Full zip (개발자용)
            `beopsuny-skill-full-${{ github.ref_name }}.zip`은 레포 전체 (테스트, plugin manifest 포함).
