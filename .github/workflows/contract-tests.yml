name: Contract Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate skill document contracts
        run: python tests/validate_skill_contracts.py

      - name: Evaluate router guardrail outputs
        run: python tests/evaluate_scenario_outputs.py

      - name: Test forward eval harness
        run: python -m unittest tests/test_forward_eval_harness.py

      - name: Compile test harnesses
        run: python -m py_compile tests/validate_skill_contracts.py tests/evaluate_scenario_outputs.py tests/forward_eval_harness.py
