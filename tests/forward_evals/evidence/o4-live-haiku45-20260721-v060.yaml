    7. 공중위생 등 공공의 안전과 안녕을 위하여 긴급히 필요한 경우


    **제2항** 개인정보처리자는 제1항제1호에 따른 동의를 받을 때에는 다음 각 호의 사항을 정보주체에게 알려야 한다. 다음 각 호의 어느 하나의
