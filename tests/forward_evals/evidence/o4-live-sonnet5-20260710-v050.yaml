    중)로 원문 필드 조회 불가.

    - Read: 사건 개요, 판시사항 요지, 인용 금액, 주문(상고기각) 확인. 판결문 이유 전문(全文)은 읽지 못함.

    - Currency: 2018년 확정판결로 이후 이 판결 자체의 변경 사유는 없음. 다만 동일 사고에 대해 원고 그룹별로 다수의 병행 소송이
    있었음.

    - Before relying: **정확한 사건번호는 반드시 law.go.kr 종합법률정보에서 사건번호로 직접 재검색해 원문 대조 후 사용**을
    권장.


    ---


    ## 판례


    **대법원 2018. 12. 13. 선고 2018다219994, 2018다220000(병합) 판결 [손해배상(기)]**


    **[해설/의견 기반 2차 확인] [UNVERIFIED]** — casenote.kr / 법률신문 / 데일리시큐 기사 WebFetch 확인,
    law.go.kr 원문 직접 대조 실패(검색 페이지 JS 렌더링 문제), 법망 API 점검중(service_maintenance)으로 원문
    필드 미확인


    ### 사건 개요

    2014년 KB국민카드·NH농협카드·롯데카드(카드 3사)의 신용평가 위탁업체(코리아크레딧뷰로, KCB) 직원이 보안프로그램 미설치 개인 컴퓨터로
    고객정보(성명, 주민등록번호, 카드번호 등 20여 종)를 유출한 사건. 총 1억 400만 건 규모의 개인정보 유출로, 국내 최대 규모 유출
    사고 중 하나.


    ### 판시 요지

    개인정보처리자가 개인정보 보호를 위한 법령상 안전조치의무를 위반하여 고객정보가 유출된 경우, **유출된 정보의 종류·성격, 정보주체 식별 가능성,
    제3자의 열람 여부 또는 가능성, 확산 범위** 등을 종합적으로 고려하여 정신적 손해 발생 여부를 판단해야 한다는 기준을 제시. 이 사건에서는
    유출 정보가 이미 제3자에 의해 열람되었거나 열람될 가능성이 매우 크다고 보아 정신적 손해가 현실적으로 발생했다고 인정, **1인당 위자료
    10만 원**을 인용한 원심을 확정하고 카드사·KCB 측 상고를 기각.


    ### 참고: 사건번호가 여러 개 보이는 이유

    같은 유출 사고에 대해 원고 그룹별로 별도 소송이 다수 제기되어, 2018다214142(2018. 12. 28. 선고, KB국민카드·KCB
    상대) 등 유사한 병행 확정판결이 다수 존재한다. 검색 시 사건번호가 조금씩 다르게 나오는 것은 오류가 아니라 **병행소송 구조** 때문일
    가능성이 높다.


    ### 헷갈리기 쉬운 반대 사례

    자주 함께 검색되는 **GS칼텍스 개인정보유출 사건(대법원 2012. 12. 26. 선고 2011다59834, 59858, 59841 판결)**은
    정반대로 **손해배상 불인정(원고 패소)** 판례다. 유출된 정보를 소지한 관련자들로부터 저장매체가 모두 압수·폐기되어 후속 피해 가능성이
    낮다고 보아 정신적 손해를 부정했다. 초기 웹검색 요약에서 이 판례를 "인정 사례"로 잘못 언급하는 결과가 있었는데, 실제로는 반대 결론이므로
    주의가 필요하다.


    ---


