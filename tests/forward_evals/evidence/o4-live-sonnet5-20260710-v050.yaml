    요지만 확인) | Client Alignment n/a | Counter-draft n/a


    이번 조사는 Lite 모드(로컬 precedent-kr 미러 없음)로 진행됐고, 법망 API 점검·law.go.kr 검색 페이지 렌더링 문제로
    **원문 직접 대조에는 실패**했습니다. 여러 언론·판례DB가 일관되게 보도하는 내용이라 신뢰도는 높지만, `[VERIFIED]`가 아닌 `[UNVERIFIED]`
    상태로 남겨둡니다. 실무 인용 전 law.go.kr 종합법률정보에서 "2018다219994"로 직접 검색해 원문을 대조하시길 권합니다.


    ⚠️ **참고**: 이 정보는 일반적인 법률 정보 제공 목적이며, 구체적인 법률 문제는 변호사와 상담하시기 바랍니다.

    '
