  output: '# 개인정보 유출 손해배상 인정 대법원 판례


    **검토자 메모**

    - Sources: casenote.kr, 법률신문(lawtimes.co.kr), 데일리시큐 등 2차 판례 데이터베이스/언론 기사를 WebFetch로
