    > **② 개인정보처리자는 제1항제1호에 따른 동의를 받을 때에는 다음 각 호의 사항을 정보주체에게 알려야 한다.** 다음 각 호의 어느 하나의
    사항을 변경하는 경우에도 이를 알리고 동의를 받아야 한다.

    > 1. 개인정보의 수집·이용 목적

    > 2. 수집하려는 개인정보의 항목

