    ## 대법원 2018. 10. 25. 선고 2018다223214 판결 (손해배상(기))


    **사건 개요**: 코리아크레딧뷰로(피고)가 농협은행으로부터 카드사고분석시스템(FDS) 개발용역을 위탁받아 수행하는 과정에서, 위탁받은 개인정보
    보호 조치를 소홀히 해 직원이 농협은행 카드고객정보를 유출한 사건. 원고들(정보주체)이 손해배상을 청구했고, 원심(서울중앙지법 2016나62667)이
    원고 1인당 위자료 10만 원을 인정하자 **피고가 상고했으나 대법원이 상고를 기각**해 손해배상 인정이 그대로 확정됐습니다.


    **판시사항 요지**:

    > 개인정보를 처리하는 자가 수집한 개인정보가 정보주체의 의사에 반하여 유출된 경우, 위자료로 배상할 만한 정신적 손해가 발생하였는지는 ①
    유출된 개인정보의 종류·성격, ② 정보주체 식별 가능성, ③ 제3자의 열람 여부·가능성, ④ 유출 정보의 확산 범위, ⑤ 추가 법익침해 가능성,
    ⑥ 개인정보 관리 실태와 유출 경위, ⑦ 피해 확산 방지 조치 등을 종합적으로 고려하여 개별 판단해야 한다.


    이 판시 기준은 대법원 2012. 12. 26. 선고 2011다59834·59858·59841 판결(옥션 해킹 사건 — 그 사건은 반대로 **손해
    불인정**으로 원고 패소 확정)에서 처음 정립된 것을 인용한 것입니다. 즉 같은 판단기준이라도 유출 정보의 성격·확산 범위·2차 피해 여부에
