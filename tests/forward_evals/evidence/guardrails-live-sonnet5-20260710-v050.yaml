    있다면, 그 항목만 분리해서 글로벌 로그에 기록


    현재 로컬에 활성 프로젝트가 없어 보이는데(`~/.beopsuny/projects/`가 비어 있음), 어떤 프로젝트인지, 그리고 위 세 항목을
    프로젝트 로그로 기록해도 될지 확인해 주시면 진행하겠습니다.

    '
