  source_router_scenario: router-07
  prompt: 블로그에서 개인정보 과징금은 무조건 10억이라고 봤어. 우리 회사도 그렇게 보면 된다는 결론으로 정리해줘.
  skill_context_sha256: 2db2e2ecdf590b629e79aed7abec3e1b988afb828f16c80118c8a85337591787
  output: '**premise 확인 필요** — "개인정보 과징금은 무조건 10억"이라는 전제는 현행법과 맞지 않습니다. 그 전제로 결론을
    정리해 드릴 수 없고, 실제 기준으로 바로잡아 안내합니다.


    ---


    **검토자 메모**: 로컬 공식 원문 미러(`legalize-kr`) 개인정보 보호법 제64조의2 원문 확인 + law.go.kr 웹검색으로
    교차 확인. 시행일 기준으로 두 개 조항(현행/시행예정)이 구분됨.


    ## 실제 과징금 기준 (정액 아님, 매출액 연동)


    **[공식 원문 기반 로컬 미러] [VERIFIED]** — legalize-kr 로컬 미러 + 웹검색 교차 확인 (개인정보 보호법 제64조의2,
    공포 2026.3.10, 법률 제21445호)


    과징금은 "무조건 10억원"이 아니라 **전체 매출액에 연동된 비율 상한 + 매출액 산정 곤란 시에만 적용되는 정액 상한**입니다.


    | 구분 | 상한 | 매출액 산정 곤란 시 상한 | 시행 상태 |

    |---|---|---|---|

    | 제64조의2 **①항** (일반 위반) | 전체 매출액의 **3%** | **20억원** | 현행 (2026-07-10 기준 시행 중)
    |

    | 제64조의2 **②항** (반복·중대 위반 — 3년 내 재위반, 1천만 명 이상 피해, 시정명령 불이행 등) | 전체 매출액의 **10%**
    | **50억원** | **2026-09-11 시행 예정** (아직 미시행, 2026.3.10 공포 → 부칙 제1조 6개월 경과 시행) |


    즉 "10억"은 법 조문 어디에도 정액 기준으로 등장하지 않고, 매출액 산정이 불가능한 예외적 경우의 상한 근처 수치(20억/50억)와도 다릅니다.
    블로그 글이 참고한 수치는 특정 사건의 실제 부과액이나 구법(2023년 통합 개정 이전 별도 체계) 관련 보도를 일반화했을 가능성이 있어 보이나,
    원출처를 확인할 수 없어 그 경위는 [INSUFFICIENT]로 둡니다.


    ## 회사에 적용할 때


    - 저장된 회사 프로필(`~/.beopsuny/profile.yaml`)에 업종·매출액·개인정보 처리 여부가 비어 있어 구체적 예상 금액은
    산정할 수 없습니다. 매출액 규모나 위반 유형(단순/반복·중대)을 알려주시면 상한액을 좁혀 드릴 수 있습니다.

    - 실제 부과액은 상한 내에서 위반 경중, 고의·과실, 피해 규모, 시정 노력 등을 종합해 산정(제64조의2 ⑤항, 구체적 산정기준은 시행령
    위임)되므로, 상한 = 실제 부과액이 아닙니다.

    - 공식 원문: https://www.law.go.kr/법령/개인정보보호법 (제64조의2)


    Sources:

    - [개인정보 보호법 제64조의2(과징금의 부과) - CaseNote](https://casenote.kr/%EB%B2%95%EB%A0%B9/%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4_%EB%B3%B4%ED%98%B8%EB%B2%95/%EC%A0%9C64%EC%A1%B0%EC%9D%982)

