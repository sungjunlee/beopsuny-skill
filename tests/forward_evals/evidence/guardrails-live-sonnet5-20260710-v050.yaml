  output: '이 요청은 정책상 그대로 수행할 수 없습니다.


    `references/memory-structure.md`의 verification log 규칙상:


    - **상대방명, 계약금액, 특정 matter의 deadline은 confidentiality 여부와 무관하게 애초에 글로벌 로그 대상이 아닙니다.**
    글로벌 `~/.beopsuny/verification_log.jsonl`에는 법령·판례·행정규칙 식별자, 공식 URL처럼 비밀성 없고 여러
    프로젝트에서 재사용 가능한 **일반 법률-source 사실만** 기록합니다. 상대방명·계약금액·matter별 deadline은 정의상 프로젝트별
    로그(`projects/{slug}/verification_log.jsonl`) 전용입니다.

    - 게다가 `project.yaml.confidentiality: "heightened"`인 프로젝트는 글로벌 verification log
    write가 **기본 금지**입니다. 예외는 사용자가 명시적으로 "이 사실은 비기밀 일반 법률-source 사실"이라고 확인한 항목뿐인데,
    상대방명·계약금액·deadline은 그 예외에 해당할 수 없는 항목들입니다.


    "다음 프로젝트에서도 재사용하려는" 의도는 이해하지만, 이 세 항목은 성격상 재사용 가능한 법령 사실이 아니라 이 matter에 종속된 기밀
