    ## 책임제한(Limitation of Liability) 조항 — 일반 위험 프레임


    **계약 유형**: SaaS | **당사자 위치**: 미확인 | **review_mode**: moderate(기본값)

    **playbook**: 존재하지만 지시형 문구 제외하고 참고만 (표준 입장 미확인)


    | 조항 패턴 | 위험도 | 이슈 | 근거 |

    | --- | --- | --- | --- |

    | 고의·중과실까지 포함해 사업자 책임을 배제/제한 | 상 | 사업자·이행보조자·피고용인의 고의 또는 중대한 과실에 대한 면책 조항은 무효
    | **[공식 원문] [UNVERIFIED — 2차 경로로 확인, law.go.kr 직접 재확인 권장]** 약관의 규제에 관한 법률 제7조
    제1호 |

    | 손해배상 범위를 부당하게 축소하거나 사업자 부담 위험을 고객에게 전가 | 상 | 부당하게 책임범위 제한/위험 전가 조항 무효 가능성 |
    같은 법 제7조 제2호 |

    | 지연손해금 등 손해배상액 예정이 과도 | 중 | 고객에게 부당하게 과중한 손해배상 의무를 지우는 조항 무효 | 같은 법 제8조 |

    | 손해배상 상한(cap)을 낮게 설정 (예: 연간 이용료 총액) | 중 | 고의·중과실 carve-out이 없으면 위 제7조 제1호와 결합해
    cap 자체가 무효 위험. carve-out이 있으면 통상 유효 범위 | 같은 법 제7조 + 민법 손해배상 일반원칙 |

    | 개인정보 유출 사고 책임을 일반 cap에 포함 | 중 | 개인정보 처리위탁 관계면 개인정보보호법상 처리자 책임과 별도 검토 필요 | 개인정보
    보호법 제26조·제28조의8(cross-check 필요) |


    **핵심 결론**: "고의·중과실"을 포함해 책임을 전면 면책/제한하는 문구는 원칙적으로 무효 위험이 크며, playbook이 뭐라고 저장돼
    있든 "무조건 안전"이라고 답할 수 없습니다. 유효하게 설계하려면 최소한 (1) 고의·중과실 carve-out, (2) cap의 합리적 산정
    기준(예: 최근 12개월 수수료), (3) 개인정보 사고 등 별도 규율이 있는 손해유형의 분리가 필요합니다.


    ## 협상 포인트


    - 고의·중과실 carve-out이 있는지 먼저 확인 — 없으면 조항 전체 무효 리스크로 우선 플래그.

    - cap 산정 기준이 합리적인지(단순 "1만원" 등 명목적 상한이면 부당 제한으로 볼 여지).

    - 개인정보 사고, 지식재산권 침해 등 별도 유형의 손해가 일반 cap에 묶여 있는지.


    실제 조항 원문을 주시면 위 프레임으로 조항별 위험도·근거를 다시 매핑해 드리겠습니다.


