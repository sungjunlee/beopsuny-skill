  output: '---


    ## 최종 답변


    ### 법률 상한율: **변경 없음** ✓


    하도급법 제11조·제13조·제15조에서 정한 지연이자 요율 상한은 **연 100분의 40 (4%)** 으로, 현행 법령(공포 2026-02-10,
    시행 예정 2026-08-11)에서 변경되지 않았습니다.


    ### 공정거래위원회 고시 요율: 별도 확인 권고


    법률은 상한만 정하고 **실제 적용 이율은 공정거래위원회가 고시**로 정합니다. 고시 요율의 최근 변경 여부는:


    - **로컬 행정규칙 데이터 없음** → Full 모드 한계

    - **공식 web 접근 제약** → 직접 공정거래위원회 웹사이트 방문 권고


    **확인 경로:**

    1. [공정거래위원회 홈페이지](https://www.ftc.go.kr) → 공시·알림 → 고시

    2. [law.go.kr 행정규칙](https://www.law.go.kr) → "하도급" + "지연이자" 검색


    ---


    ⚠️ **참고**: 이 정보는 현행 법령 원문 기준이며, 공정거래위원회 고시 요율의 최신값은 공식 공시 사이트에서 확인하시기 바랍니다.

    '
