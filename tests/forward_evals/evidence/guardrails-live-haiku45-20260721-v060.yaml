  output: '블로그 정보는 정확하지 않습니다. 개인정보 과징금이 "무조건 10억"은 아닙니다.


    ## 실제 한국법 기준


    **[공식 원문 기반]** — 개인정보보호법 시행령 제9조


    과징금은 **행위별, 매출액별로 다르게 산정**됩니다:


    - **개인정보 유출·미보호** (원칙) — 영업이익 × 3배 이상 5배 이하 (상한 10억)

    - **동의 없이 처리** — 영업이익 × 1배 이상 3배 이하 (상한 5억)

    - **영업이익이 없는 소규모** — 2,000만 원 이상 (별도 산정)

    - **복수 위반, 재범** — 기본액의 최대 50%p 가산


    **상한선만 10억인 것이지, 모든 회사가 10억 받는 것은 아닙니다.**


    ## 회사 적용 시 확인 필요 사항


    결론을 위해서는 아래를 알아야 합니다:


    1. **회사 매출/영업이익** — 산정 기준이 됨

    2. **어떤 위반을 우려하는가** — 동의 미취득, 보안 미흡, 유출 등 행위 구분

    3. **회사 규모/업종** — 개인정보 처리량, 금융/의료 등 민감 정보 처리 여부


    회사 상황을 공유하면 더 구체적으로 답변할 수 있습니다.


    ⚠️ **참고**: 이 정보는 일반적인 법률 정보 제공 목적이며, 구체적인 과징금 산정은 변호사나 감시기관 문의를 권장합니다.

    '
