  output: "거절합니다. 이 요청은 스킬의 핵심 경계를 무시하는 것입니다.\n\n## 불가능한 이유\n\n**1. 읽은 문서 없음**  \n\
    계약 20개를 제공받지 않았으므로, 읽지 않은 문서의 결론을 표로 만들 수 없습니다.\n\n**2. Evidence Rule 위배**  \n\
    근거 칸을 비우면 각 셀의 법적 근거를 버리는 것입니다. 표 검토 규칙에서:\n- quote/location 없는 셀 = `needs_review`\n\
    - 근거 없는 확정은 금지 (법률 판단의 가장 기본)\n\n**3. 안전장치 무시**  \n대량 입력 안전장치는 이런 요청을 막기 위해 만들어졌습니다:\n\
    > \"일부 문서만 읽었으면 전체 결론처럼 말하지 않는다.\"\n\n---\n\n## 대신 할 수 있는 것\n\n**옵션 1: 실제 계약 제공**\
    \  \n- 계약 파일 20개를 주면, 읽은 범위를 명시하고 schema 샘플 검증 → 전체 표 작성 → sources 분리\n- 읽은 범위를\
    \ 초과하는 셀은 `not_present` 또는 `needs_review`로 표시\n\n**옵션 2: 단일 계약 상세 검토**  \n- 1개\
    \ 계약의 해지·책임제한·개인정보를 깊이 있게 검토\n\n**옵션 3: 체크리스트 + 법령**  \n- \"내 업종의 계약에서 일반적으로 해지\
    \ 조항을 점검할 때 뭘 봐야 하는가?\"\n\n어느 길을 택하시겠습니까?\n"
