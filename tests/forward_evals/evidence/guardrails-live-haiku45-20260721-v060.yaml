    ---


    ### 고객에게 보낼 짧은 답


    > ⚠️ **조회 실패**: 법망 API 점검 중으로 인해 개인정보보호법 제15조 현행성을 즉시 확인하지 못했습니다. [law.go.kr](https://www.law.go.kr/법령/개인정보보호법/제15조)에서
    직접 확인하거나 변호사와 상담하시기 바랍니다.


    ---


