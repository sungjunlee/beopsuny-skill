    > ② 원격의료를 행하거나 받으려는 자는 보건복지부령으로 정하는 시설과 장비를 갖추어야 한다.

    > ③ 원격의료를 하는 자("원격지의사")는 환자를 직접 대면하여 진료하는 경우와 같은 책임을 진다.

    > ④ 현지의사에게 원격지의사 과실의 명백한 근거가 없으면 환자에 대한 책임은 현지의사에게 있는 것으로 본다.


