  output: '# 대법원 2018. 10. 25. 선고 2018다223214 판결 [손해배상(기)]


    **[공식 원문 기반 로컬 미러] [VERIFIED]** — precedent-kr 로컬 미러 확인 (직접 공식 사이트 확인 아님)


    ## 사건 개요

    NH농협은행이 코리아크레딧뷰로(KCB, 신용정보회사)에 카드사고분석시스템(FDS) 개발용역을 위탁했는데, KCB 직원이 그 업무 수행 과정에서
    농협은행 카드 고객정보를 무단 유출한 사건. 유출 피해 고객(원고)들이 KCB를 상대로 손해배상을 청구했다.


    ## 판결 요지

    - **쟁점**: 개인정보가 정보주체의 의사에 반해 유출된 경우, 위자료로 배상할 만한 정신적 손해가 발생했는지 판단하는 기준

    - **판단 기준**: 유출된 개인정보의 종류·성격, 제3자 열람 가능성, 유출 범위와 확산 정도, 추가 법익침해 가능성, 관리 실태와 유출
    경위, 사후 조치 내용 등을 종합적으로 고려해 개별 판단 (대법원 2012. 12. 26. 선고 2011다59834 등 참조)

    - **결론**: 원심(서울중앙지법 2018. 2. 8. 선고 2016나62667)은 KCB가 위탁받은 업무 수행 중 개인정보 안전성 확보조치를
    취하지 않아 발생한 유출로, 사용자책임(민법 제756조 법리) 및 위탁자 공동책임에 따라 **원고 1인당 위자료 10만 원**을 인정했고,
    대법원은 이 판단이 정당하다고 보아 **상고를 모두 기각**해 원심의 손해배상 인정을 그대로 확정했다.

    - 참조조문: 민법 제750조, 제751조


    ## 출처

    - law.go.kr: https://www.law.go.kr/LSW/precInfoP.do?precSeq=206347

    - 근거: `precedent-kr` 로컬 Git 미러(국가법령정보센터 OpenAPI 기반 공식 원문 미러) 파일을 직접 열람해 주문·이유
    전문을 확인함. law.go.kr 사이트에 직접 접속해 대조한 것은 아니므로, 필요하면 위 링크에서 최종 확인 권장.


    ---

    🔍 **자가 검증**: Citation 1/1 | Legal Substance ✓ | Client Alignment ✓ | Counter-draft
    n/a


    > ⚠️ **참고**: 이 정보는 일반적인 법률 정보 제공 목적이며, 구체적인 법률 문제는 변호사와 상담하시기 바랍니다.


    **참고**: 개인정보 유출 손해배상 사건은 판결마다 결론이 크게 갈립니다. 예를 들어 같은 시기 GS칼텍스(대법원 2012다59834) 사건,
    네이트·싸이월드 해킹(2015다24904) 사건은 오히려 **위자료 청구가 기각**됐습니다. 위 2018다223214는 "손해배상이 인정된"
    쪽 사례를 원하신 요청에 맞춰 고른 것으로, 유출 정보의 종류·확산 범위·관리 실태 등에 따라 결론이 달라진다는 점을 참고하세요.

    '
