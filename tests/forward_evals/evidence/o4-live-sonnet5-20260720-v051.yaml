    1. 정보주체의 동의를 받은 경우

    2. 법률에 특별한 규정이 있거나 법령상 의무를 준수하기 위하여 불가피한 경우

    3. 공공기관이 법령 등에서 정하는 소관 업무의 수행을 위하여 불가피한 경우

    4. 정보주체와 체결한 계약을 이행하거나 계약을 체결하는 과정에서 정보주체의 요청에 따른 조치를 이행하기 위하여 필요한 경우

    5. 명백히 정보주체 또는 제3자의 급박한 생명, 신체, 재산의 이익을 위하여 필요하다고 인정되는 경우

    6. 개인정보처리자의 정당한 이익을 달성하기 위하여 필요한 경우로서 명백하게 정보주체의 권리보다 우선하는 경우. 이 경우 개인정보처리자의 정당한
    이익과 상당한 관련이 있고 합리적인 범위를 초과하지 아니하는 경우에 한한다.

    7. 공중위생 등 공공의 안전과 안녕을 위하여 긴급히 필요한 경우


    **② 개인정보처리자는 제1항제1호에 따른 동의를 받을 때에는 다음 각 호의 사항을 정보주체에게 알려야 한다.** 다음 각 호의 어느 하나의
    사항을 변경하는 경우에도 이를 알리고 동의를 받아야 한다.


    1. 개인정보의 수집·이용 목적

    2. 수집하려는 개인정보의 항목

    3. 개인정보의 보유 및 이용 기간

    4. 동의를 거부할 권리가 있다는 사실 및 동의 거부에 따른 불이익이 있는 경우에는 그 불이익의 내용


    **③ 개인정보처리자는 당초 수집 목적과 합리적으로 관련된 범위에서 정보주체에게 불이익이 발생하는지 여부, 암호화 등 안전성 확보에 필요한
