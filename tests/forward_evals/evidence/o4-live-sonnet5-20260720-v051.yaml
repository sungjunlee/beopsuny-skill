    개인정보 유출 사건**입니다.


    ---


    **[공식 원문 기반 로컬 미러] [VERIFIED]** — precedent-kr 로컬 미러 확인 (직접 공식 사이트 확인 아님)


    ### 사건번호

    대법원 2019. 9. 26. 선고 **2018다222303, 222310, 222327** 판결 (손해배상(기))

    - 원심: 서울고법 2018. 2. 2. 선고 2016나2090012, 2090029, 2090036 판결

    - 피고(상고인): 롯데카드 주식회사


    ### 사실관계

    2009~2010년 롯데카드가 카드사고분석시스템(FDS) 업데이트 용역을 외부 업체(비아이랩)에 맡기면서 업무상 필요로 회원 개인정보를 제공했는데,
    그 업체 직원이 업무용 하드디스크를 몰래 반출해 카드회원 약 1,023만 명의 개인정보(성명, 주민등록번호 등)를 유출하고, 그중 약 255만
    명분을 대출중개업자에게 넘긴 사건입니다.


    ### 판결요지 (핵심)

    1. **손해배상책임 성립**: 카드사가 용역업체 직원에게 회원 개인정보를 제공·취급하게 하면서 하드디스크 수량 파악·포맷 감독 등 유출 방지
    조치를 다하지 않은 잘못이 인정되어, 민법 제750조 불법행위에 따른 손해배상책임을 부담한다고 판단.

    2. **정신적 손해(위자료) 인정 기준**: 유출된 개인정보의 종류·성격, 식별 가능성, 제3자 열람 여부·가능성, 확산 범위, 추가 법익침해
    가능성, 관리 실태와 유출 경위, 사후 조치 등을 종합적으로 고려해 개별 판단.

    3. **결론**: 유출 정보에 주민등록번호가 포함되어 2차 피해 가능성을 배제하기 어렵고, 유출 경위상 제3자 열람 가능성이 컸다는 점에서
    원심이 인정한 **1인당 위자료 7만 원**을 정당하다고 보고 상고 기각(원심 확정).


    참고로 이 판결이 인용한 선행 판단기준 판례가 **대법원 2012. 12. 26. 선고 2011다59834, 59858, 59841 판결(GS칼텍스
    사건)**인데, 이 사건은 같은 기준을 적용하고도 유출 정보가 곧바로 압수·회수·폐기되어 확산되지 않았다는 이유로 위자료를 **불인정**했습니다.
    두 판결을 비교하면 "정보 확산·2차 피해 가능성"이 손해 인정 여부를 가르는 핵심 요소임을 알 수 있습니다.


    ### 출처

    - 로컬 확인: `precedent-kr` 미러 — `민사/대법원/대법원_2019-09-26_2018다222303_222310_222327.md`

    - 원문 링크: https://www.law.go.kr/LSW/precInfoP.do?precSeq=209687 (frontmatter `출처`
    필드, 미러 파일에 기재된 값이며 직접 열어 확인한 것은 아님)


