  output: '## 개인정보 보호법 제15조 (개인정보의 수집·이용)


    **[공식 원문 기반 로컬 미러] [VERIFIED]** — legalize-kr 로컬 미러 확인 (직접 공식 사이트 확인 아님)


    **① (수집·이용 근거)** 개인정보처리자는 다음 각 호의 어느 하나에 해당하는 경우에는 개인정보를 수집할 수 있으며 그 수집 목적의 범위에서
    이용할 수 있다. `<개정 2023.3.14>`


    1. 정보주체의 동의를 받은 경우

    2. 법률에 특별한 규정이 있거나 법령상 의무를 준수하기 위하여 불가피한 경우

    3. 공공기관이 법령 등에서 정하는 소관 업무의 수행을 위하여 불가피한 경우

    4. 정보주체와 체결한 계약을 이행하거나 계약을 체결하는 과정에서 정보주체의 요청에 따른 조치를 이행하기 위하여 필요한 경우

    5. 명백히 정보주체 또는 제3자의 급박한 생명, 신체, 재산의 이익을 위하여 필요하다고 인정되는 경우

    6. 개인정보처리자의 정당한 이익을 달성하기 위하여 필요한 경우로서 명백하게 정보주체의 권리보다 우선하는 경우 (정당한 이익과 상당한 관련이
    있고 합리적 범위를 초과하지 않는 경우에 한함)

    7. 공중위생 등 공공의 안전과 안녕을 위하여 긴급히 필요한 경우


    **② (동의 시 고지사항)** 개인정보처리자는 제1항제1호에 따른 동의를 받을 때에는 다음 각 호의 사항을 정보주체에게 알려야 한다. 변경
    시에도 동일하게 고지·동의 필요.


    1. 개인정보의 수집·이용 목적

    2. 수집하려는 개인정보의 항목

    3. 개인정보의 보유 및 이용 기간

    4. 동의 거부 권리 및 거부 시 불이익 내용(있는 경우)


    **③ (목적 내 추가 이용의 예외)** 당초 수집 목적과 합리적으로 관련된 범위에서 정보주체 불이익 여부, 암호화 등 안전조치 여부를 고려하여
    대통령령이 정하는 바에 따라 동의 없이 이용 가능. `<신설 2020.2.4>`


    ---


    ### 소스 및 검증 경위


    | 항목 | 내용 |

    |---|---|

    | 소스 파일 | `~/.beopsuny/data/legalize-kr/kr/개인정보보호법/법률.md` |

    | 원문 확인 방식 | 로컬 파일 직접 열람 (`law.go.kr` 원문 직접 확인 아님) |

    | 최종 실체 개정일 | 제1항 2023.3.14 / 제3항(신설) 2020.2.4 |


    **주의할 점**: 이 미러 파일 frontmatter의 `시행일자`는 **2026-09-11**(오늘 2026-07-21 기준 미래)로,
    파일 전체는 "시행 전 공포본"(2026.3.10 일부개정, 미시행)입니다. 다만 해당 개정은 제26조(수탁자 준용조항), 제58조의2(친목단체
    적용제외)처럼 **제15조를 인용하는 다른 조문만** 건드렸고, 제15조 본문 자체는 개정 대상이 아님을 git 커밋 diff로 직접 확인했습니다.
