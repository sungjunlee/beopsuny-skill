  output: '로컬 미러(Full 모드)에서 개인정보 유출 손해배상이 실제로 **인정된** 대법원 판례를 확인했습니다.


    ---


    **사건번호**: 대법원 2018. 10. 25. 선고 2018다219406 판결 (손해배상(기))

    **당사자**: 원고(선정당사자) 등 vs 피고 주식회사 케이비국민카드, 코리아크레딧뷰로 주식회사


    **요지**: KB국민카드가 코리아크레딧뷰로에 카드사고분석시스템(FDS) 개발용역을 위탁하는 과정에서 개인정보 보호조치 의무(보안프로그램 설치·관리감독,
    암호화, 접근권한 제한 등)를 다하지 않아 카드고객정보가 유출된 사건입니다.


    대법원은 "개인정보를 처리하는 자가 수집한 개인정보가 정보주체의 의사에 반하여 유출된 경우, 위자료로 배상할 만한 정신적 손해가 발생했는지는
    ① 유출된 정보의 종류·성격, ② 제3자의 열람 가능성, ③ 정보 확산 범위, ④ 관리 실태와 유출 경위, ⑤ 사후 조치 등을 종합적으로 고려해
    개별 판단해야 한다"는 기준(2011다59834 법리 재확인)을 제시했습니다.


    원심은 유출된 정보가 "개인 식별이 가능하고 사생활·신용과 밀접히 관련되며, 제3자에 의해 이미 열람되었거나 열람 가능성이 크다"는 이유로
    정신적 손해 발생을 인정하고 **1인당 위자료 10만 원**을 지급하도록 판결했고, 대법원은 이 판단이 정당하다고 보아 피고들의 상고를 모두
    기각 — 즉 **원심의 손해배상 인정을 그대로 확정**했습니다.


    참고로 이 법리의 원형인 대법원 2012. 12. 26. 선고 2011다59834 판결(GS칼텍스 사건)이나 이후 네이트·싸이월드 사건(2015다24904)
    등 다수의 대형 유출 사건은 오히려 "정신적 손해가 발생했다고 보기 어렵다"며 배상을 **부정**했습니다. 이번 사건은 그와 반대로 손해 발생이
    실제로 인정·확정된 사례입니다.


