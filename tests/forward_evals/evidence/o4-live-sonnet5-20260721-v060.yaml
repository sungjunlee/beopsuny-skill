    제정·개정문 페이지)에서 동일하게 확인됩니다.


    **주요 개정 내용** (2025-9호, `[EDITORIAL]` — 로펌 해설·뉴스 기준, 결론 근거 아님·맥락 참고용):

    - 인터넷망 차단 조치를 일률 의무에서 위험기반 방식으로 완화, 예외 허용 확대

    - 오픈마켓 판매자용 시스템 등에 대한 보호조치 의무 신설

    - 접속기록 보관 대상을 "개인정보취급자"에서 "개인정보처리시스템 접속자(정보주체 제외)"로 확대, 월 1회 일률 점검 의무를 내부관리계획
    기반 자율 점검으로 전환


    **⚠️ 조문별 유예 시행일 — `[UNVERIFIED]`**: 위 개정 중 접속기록·내부관리계획 관련 조문은 2025-10-31 즉시 시행이
