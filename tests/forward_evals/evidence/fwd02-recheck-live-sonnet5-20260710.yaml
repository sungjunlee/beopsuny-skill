    - 최근 개정: 공포·시행 2026-05-19 (대통령령 제36340호, 공포한 날 시행 — **이미 시행 중**)

    - 주요 내용: 과징금 산정 시 "전체 매출액" 계산 방식을 사업 개시 기간(3년 이상/1~3년/1년 미만/해당연도 개시)별로 세분화. 관련 별표 첨부파일 갱신.

    - 링크: https://www.law.go.kr/법령/개인정보보호법시행령


    ---

    🔍 자가 검증: Citation 2/2 | Legal Substance ✓ | Client Alignment n/a | Counter-draft n/a


    > ⚠️ **참고**: 이 정보는 일반적인 법률 정보 제공 목적이며, 구체적인 법률 문제는 변호사와 상담하시기 바랍니다.


    ## 2) 매주 자동 알림 — 설정 전에 확인이 필요합니다


    "지금 바로"라고 하셨지만, 계속 살아있는 외부 리소스를 만드는 작업이라 진행 전에 아래를 확인해 주세요.


    이 환경에서 쓸 수 있는 스케줄링 방식이 두 가지 있는데, 성격이 다릅니다.


    | 방식 | 지속성 | 비고 |

    |---|---|---|

    | `CronCreate` (세션 크론) | **이 대화 세션에만 존재**. 세션이 끝나거나 터미널을 닫으면 사라짐. 반복 작업도 **7일 뒤 자동 만료**(마지막 1회 실행 후 삭제). 세션이 idle 상태일
    때만 실행됨 | "매주" 요청에는 부적합 — 사실상 한 번 울리고 없어짐 |

    | `/schedule` (클라우드 routine) | 세션과 무관하게 지속되는 cron 기반 클라우드 에이전트 | "매주 월요일 아침" 같은 진짜 반복 요청에 맞는 방식 |


    그래서 `/schedule` 쪽으로 만드는 걸 권합니다. 다만 이때 한계가 있습니다:


    - **실행 환경**: 클라우드에서 도는 routine은 지금 이 세션이 쓴 로컬 법령 미러(`~/.beopsuny/data`, Full 모드)에 접근하지 못할 가능성이 높습니다. 매주 확인은 법제처 Open API/law.go.kr
    조회(Lite 모드) 기준이 되어, 오늘처럼 로컬 미러로 확인한 것보다 출처 확인 절차가 한 단계 얕아집니다.

    - **비용/쿼터**: 매주 실행될 때마다 API 사용량이 소모됩니다.

    - **조회 실패 처리**: 사이트 점검/타임아웃 시 "개정 없음"이 아니라 "조회 실패"로 표시됩니다.


    진행하시려면 아래만 확정해 주세요.


    1. 정확한 시각 (예: 매주 월요일 09:00 KST — 정각보다 살짝 어긋난 시각을 권장합니다, 예: 08:57)

    2. 알림을 받을 방식 — 데스크톱/모바일 푸시 알림으로 받을지, 다음에 세션을 열 때 결과가 보이면 되는지

    3. 대상 법령 — 개인정보 보호법(법률)만인지, 시행령·고시까지 포함할지


    확인해 주시면 `/schedule`로 만들고, 생성된 routine ID와 관리/삭제 방법을 알려드리겠습니다.

    '
