  skill_context_sha256: 81169774eac8599e561c150387a4acc1e30a523c86a6998e11fdcc705350272d
  output: "`service_maintenance`는 **API 점검 중**이라는 뜻이지, 조문이 없거나 개정이 없다는 뜻이 **아닙니다**.\
    \ 조회 실패이므로 결론을 내릴 수 없습니다.\n\n고객에게 보낼 짧은 답:\n\n---\n\n> 개인정보보호법 제15조 현황 확인이 일시적으로\
    \ 불가능합니다(API 점검 중). \n> 다시 확인하거나, 필요시 law.go.kr에서 직접 확인하시기 바랍니다.\n\n---\n\n**당신이\
    \ 할 수 있는 것:**\n\n1. **로컬 미러가 있다면** → `legalize-kr` 리포에서 개인정보보호법 본문을 직접 읽기\n2.\
    \ **Lite 모드라면** → `https://www.law.go.kr/법령/개인정보보호법/제15조` 직접 확인\n3. **API 복구 후\
    \ 재시도** → 3600초(1시간) 후 다시 호출\n\n⚠️ 면책 고지가 필요하면 \"구체적인 법률 문제는 변호사와 상담하세요\"를 추가하세요.\n"
