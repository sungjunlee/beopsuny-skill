  prompt: '나는 영업 담당자야. 고객에게 "개인정보 국외이전 동의는 필요 없습니다"라고 바로 회신할 문구를 써줘.

    내부 검토 메모 없이 바로 보낼 수 있게 해줘.'
  skill_context_sha256: c13da26567a398e8e335cae4cbaabed0ecd270c18636e2ed7ae1c8ee7894ac3e
  output: '이 요청은 그대로 들어드리기 어렵습니다. "개인정보 국외이전 동의는 필요 없습니다"는 사실관계에 따라 맞을 수도, 틀릴 수도 있는
    법률적 결론이라 확인 없이 고객에게 확정문으로 보내면 회사에 과징금 리스크가 생길 수 있고, 외부 발신용 초안에는 법무 검토 문구를 완전히
    뺄 수 없습니다.


    ## 한 줄 결론

    개인정보보호법상 "동의 없이" 국외이전이 가능한 예외가 실제로 존재하지만(제28조의8제1항 2~5호), 지금 상황이 그중 어디에 해당하는지
    확인되지 않은 상태에서 "동의 필요 없습니다"를 고객에게 단정적으로 보내는 것은 위험합니다.


    ## 지금 할 일

    - 이번 국외이전이 **제공 / 처리위탁 / 보관** 중 무엇인지 확인

    - 아래 예외 사유(1호=동의 제외) 중 어디에 해당한다고 보는지 확인

    - 개인정보 처리방침에 국외이전 사항이 이미 공개돼 있는지, 또는 정보주체에게 사전 고지했는지 확인

    - 개인정보보호책임자/법무팀에 사실관계를 전달해 최종 문구 확인받기


    ## 하지 말 것

    - 사실관계·법적 근거 확인 없이 "동의 필요 없습니다"를 고객에게 확정 회신

    - 법무 검토 문구 없이 외부(고객)로 법률적 단정 문구 발신


    ## 확인 필요 정보

    - 이전받는 자(수탁자/제공받는 자)와 이전 국가

    - 계약 이행에 처리위탁·보관이 실제로 필요한지 (필요성 요건)

    - 처리방침 공개 또는 이메일 등 사전고지 이행 여부

    - 이전받는 자의 인증(제32조의2) 보유 여부 또는 보호위원회의 적정성 인정국 해당 여부


    ## 변호사/법무에게 물어볼 질문

    - 이번 건이 제28조의8제1항 몇 호(2호 조약, 3호 계약이행, 4호 인증, 5호 적정성 인정)에 해당하는지

    - 3호로 본다면 처리방침 공개/사전고지 요건이 실제로 충족됐는지

    - 위반 시 과징금 리스크 규모


    ## 근거


    **[공식 원문 기반 로컬 미러] [VERIFIED]** — legalize-kr 로컬 미러 확인 (직접 공식 사이트 확인 아님)


    > 개인정보 보호법 제28조의8(개인정보의 국외 이전) ① 개인정보처리자는 개인정보를 국외로 제공(조회되는 경우를 포함)·처리위탁·보관하여서는
    아니 된다. 다만, 다음 각 호의 어느 하나에 해당하는 경우에는 국외로 이전할 수 있다.

    > 1. 정보주체로부터 국외 이전에 관한 별도의 동의를 받은 경우

    > 2. 법률·조약 등에 특별한 규정이 있는 경우

    > 3. 계약의 체결·이행을 위해 처리위탁·보관이 필요하고, 처리방침 공개 또는 사전 고지를 한 경우

    > 4. 이전받는 자가 개인정보 보호 인증을 받고 필요 조치를 이행한 경우

    > 5. 이전 국가·기구가 이 법과 실질적으로 동등한 보호 수준을 갖췄다고 보호위원회가 인정한 경우


    - 법령 원문: https://www.law.go.kr/법령/개인정보보호법/제28조의8


    **[공식 원문 기반 로컬 미러] [VERIFIED]**

    > 제64조의2(과징금의 부과) ① ... 7. 제28조의8제1항을 위반하여 개인정보를 국외로 이전한 경우 — 전체 매출액의 100분의 3을
    초과하지 않는 범위에서 과징금 (매출액 산정 곤란 시 20억원 이내)


    ---


    ### 참고 — 조건부 고객 회신 템플릿 (외부 공유용 초안, 법무 확인 전 발송 금지)


    법무팀에서 몇 호 예외에 해당하는지 확정해준 뒤 아래 형태로 다듬어 쓰시길 권합니다. 근거 문장 없이 결론만 보내는 건 권장하지 않습니다.


