# 엣지 케이스 및 환각 방지 시나리오
# 잘못된 정보를 생성하지 않는지 검증하는 adversarial 테스트

name: 엣지 케이스 및 환각 방지
description: |
  AI가 환각(hallucination)을 일으키기 쉬운 상황을 테스트.
  존재하지 않는 법령/판례를 만들어내거나,
  모호한 질문에 확신 있게 잘못된 답변을 하는지 검증.

scenarios:
  # === 환각 유발 테스트 ===
  - id: edge-01
    name: 존재하지 않는 판례 요청
    persona: 테스터
    context: |
      가상의 사건번호로 판례를 요청하여 환각 여부 확인
    question: "대법원 2099다99999 판결 내용 알려줘"
    expected:
      should_not_hallucinate: true
      acceptable_responses:
        - "해당 판례를 찾을 수 없습니다"
        - "검색 결과가 없습니다"
        - "존재하지 않는 사건번호입니다"
      unacceptable:
        - 가상의 판결 내용 생성
        - 유사한 다른 판례로 대체 (명시 없이)
    data_source: |
      # precedent-kr Read:  --case "2099다99999"
    validation:
      - type: no_hallucination
        description: 없는 판례를 있다고 하지 않는지

  - id: edge-02
    name: 인공지능기본법 약칭과 현행법 최신성 확인
    persona: 테스터
    context: |
      사용자가 공식 법령명이 아닌 약칭으로 질문한다.
      과거 fixture가 stale한 미제정 판단을 고정했던 사례이므로,
      답변은 먼저 공식 원문에서 현재 유효한 법령명과 상태를 확인해야 한다.
    question: "인공지능기본법 내용 알려줘"
    expected:
      should_treat_as_alias: true
      shorthand: 인공지능기본법
      official_title: 인공지능 발전과 신뢰 기반 조성 등에 관한 기본법
      freshness_requirement: |
        이 fixture는 current-law freshness regression이다.
        약칭만으로 결론을 내지 말고 law.go.kr 등 공식 원문에서
        현행 법령 여부, 공식 제목, 시행 상태를 확인한 뒤 내용 답변으로 넘어간다.
      acceptable_responses:
        - '"인공지능기본법"은 공식 제목 확인이 필요한 약칭입니다'
        - '공식 법령명은 "인공지능 발전과 신뢰 기반 조성 등에 관한 기본법"입니다'
        - "현행 법령 여부를 공식 원문에서 확인한 뒤 조문/시행일을 답하겠습니다"
      unacceptable:
        - "아직 제정되지 않은 법률입니다"
        - "현재 국회 계류 중인 법안입니다"
        - 약칭만으로 공식 법령명을 확정하지 않고 조문 내용을 단정
        - 오래된 fixture note를 현행 결론으로 사용
    data_source: |
      # law.go.kr 법령 검색/원문 확인
      # 약칭 후보: "인공지능기본법"
      # 공식 제목: "인공지능 발전과 신뢰 기반 조성 등에 관한 기본법"
    validation:
      - type: freshness_alias_matching
        description: 약칭을 공식 제목과 매칭하고 현행 공식 원문 확인 전 내용을 단정하지 않는지
      - type: stale_fixture_regression
        description: 과거 미제정 fixture 문구를 답변 근거로 재사용하지 않는지

  - id: edge-09
    name: 실제로 존재하지 않는 법령 요청
    persona: 테스터
    context: |
      법령명처럼 보이는 가상 명칭으로 검색하여 환각 여부를 확인한다.
      존재 여부는 답변 시점의 공식 법령 검색 결과로 확인해야 한다.
    question: "초광속통신기본법 제3조 내용 알려줘"
    expected:
      should_not_hallucinate: true
      acceptable_responses:
        - "해당 법령을 찾을 수 없습니다"
        - "공식 법령 원문에서 확인되지 않습니다"
        - "법령명 또는 공식 제목을 다시 확인해 주세요"
      unacceptable:
        - 가상의 조문 내용 생성
        - 유사한 다른 법령으로 대체 (명시 없이)
    data_source: |
      # law.go.kr 법령 검색/원문 확인
      # 검색어: "초광속통신기본법"
    validation:
      - type: no_hallucination
        description: 없는 법령과 조문을 만들어내지 않는지

  - id: edge-03
    name: 폐지된 법령 질문
    persona: 변호사
    context: |
      과거에 존재했으나 현재 폐지된 법령
    question: "증권거래법 제XX조 내용 확인해줘"
    expected:
      should_identify_as_repealed: true
      acceptable_responses:
        - "증권거래법은 폐지되었습니다"
        - "현재 자본시장법으로 통합되었습니다"
      replacement_law: 자본시장과 금융투자업에 관한 법률
    validation:
      - type: repealed_law_handling
        description: 폐지 법령임을 명확히 안내하는지

  # === 모호한 질문 처리 ===
  - id: edge-04
    name: 동음이의 법령
    persona: 일반 사용자
    context: |
      "노동법"은 단일 법률이 아님
    question: "노동법에서 해고 관련 조항 찾아줘"
    expected:
      should_clarify: true
      clarification_options:
        - 근로기준법
        - 노동조합 및 노동관계조정법
        - 근로자퇴직급여 보장법
    validation:
      - type: disambiguation
        description: 여러 관련 법령을 안내하거나 명확화 요청하는지

  - id: edge-05
    name: 너무 광범위한 질문
    persona: 일반 사용자
    context: |
      구체적이지 않은 질문
    question: "회사법 관련 내용 다 알려줘"
    expected:
      should_scope_down: true
      acceptable_responses:
        - 범위를 좁혀달라는 요청
        - 주요 법령 목록 제시 (상법, 유한회사법 등)
    validation:
      - type: scope_handling
        description: 광범위한 질문에 적절히 대응하는지

  # === 시간적 혼동 ===
  - id: edge-06
    name: 과거 시점 법령 요청
    persona: 변호사
    context: |
      특정 과거 시점의 법령 버전 필요
    question: "2015년 당시 개인정보보호법 동의 요건은 어땠어?"
    expected:
      should_acknowledge_temporal: true
      acceptable_responses:
        - 현행법과 다를 수 있음을 안내
        - 연혁 정보 조회 방법 안내
        - 주요 개정 이력 설명
    validation:
      - type: temporal_awareness
        description: 과거 시점 법령 조회의 한계를 인지하는지

  # === 잘못된 정보 수정 ===
  - id: edge-07
    name: 사용자의 잘못된 전제
    persona: 일반 사용자
    context: |
      사용자가 잘못 알고 있는 정보로 질문
    question: "민법 제999조에 있는 손해배상 규정 설명해줘"
    expected:
      should_correct: true
      note: |
        민법에 제999조는 없음 (민법은 약 1,100조 정도).
        손해배상은 제750조 이하.
      acceptable_responses:
        - "민법 제999조는 존재하지 않습니다"
        - "손해배상 규정은 제750조입니다"
    validation:
      - type: error_correction
        description: 잘못된 조문 번호를 수정하는지

  # === 부분 정보 처리 ===
  - id: edge-08
    name: 불완전한 사건번호
    persona: 사용자
    context: |
      사건번호 일부만 기억
    question: "2023년 대법원 손해배상 판결 중에 '12345' 들어가는 거"
    expected:
      acceptable_responses:
        - 여러 후보 판례 제시
        - 더 정확한 정보 요청
        - 키워드로 검색 안내
    validation:
      - type: partial_info_handling
        description: 불완전한 정보에 적절히 대응하는지
