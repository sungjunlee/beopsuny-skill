# 계약서 검토 보조 시나리오
# 영문/국문 계약 조항에 대한 한국법 레퍼런스 제공 테스트
#
# forbidden_phrases 두 용도 구분 (v0.2.2 housekeeping 후):
#   - "**foo**" 접두 (예: "**협상 포인트**") = 블록 헤더 존재 여부 검증.
#     설명 prose 에서 "협상 포인트" 같은 plain 단어가 자연스럽게 나올 수 있어
#     substring 매칭은 false-positive 위험. 블록 헤더는 반드시 `**...**` 로 출력됨.
#   - plain substring (예: "아래 문구로 교체") = 금지 패턴 뉘앙스 검증.
#     단일 소스 assets/policies/review_mode.yaml#counter_draft_forbidden_patterns
#     의 18개 명령형 패턴은 설명 prose 에서 자연발생 가능성 낮아 substring 유지.

name: 계약서 검토 보조
description: |
  Claude + 법순이 하이브리드로 계약서 조항을 한국법 관점에서 검토.
  - 한국어 계약서: 조항-법령 매핑, 효력 이슈 경고
  - 영문 계약서: 위 기능 + 용어 번역, 뉘앙스 차이 설명

scenarios:
  # ============================================
  # 범위 인식 테스트 (2개)
  # ============================================

  - id: contract-01
    name: 범위 내 요청 - 조항 법령 매핑
    persona: 법무팀 실무자
    context: |
      영문 SaaS 계약서 검토 중 Indemnification 조항이
      한국법에서 유효한지 확인하고자 함
    question: |
      계약서에 "Vendor shall indemnify and hold harmless Customer..."
      조항이 있는데, 한국법상 문제가 있을까요?
    expected:
      in_scope: true
      response_contains:
        - 약관규제법
        - 제7조
        - 면책
      should_warn:
        - 고의/중과실 면책 불가
      has_disclaimer: true
    reference_files:
      - assets/data/clause_references.yaml  # indemnification 조항
      - assets/data/legal_terms.yaml  # indemnify 용어
    data_source: |
      # legalize-kr Read:  "약관의 규제에 관한 법률"
    validation:
      - type: scope_recognition
        description: 법순이 범위 내 요청으로 인식하는지
      - type: law_reference
        description: 약관규제법 제7조를 정확히 인용하는지

  - id: contract-02
    name: 범위 외 요청 - 자동 분석/수정안
    persona: 스타트업 대표
    context: |
      계약서 전체를 업로드하고 위험 조항을 자동으로 찾아달라고 요청
    question: |
      이 계약서 전체를 분석해서 위험한 조항을 찾아주고
      수정안도 만들어줘
    expected:
      in_scope: false
      should_redirect: true
      redirect_to:
        - Law.ai
        - 엘박스 AI
        - 변호사 상담
    reference_files:
      - references/contract_review_guide.md  # 범위 설명
    validation:
      - type: scope_recognition
        description: 범위 외 요청으로 인식하고 전문 도구 안내하는지

  # ============================================
  # 조항별 법령 매핑 (5개)
  # ============================================

  - id: contract-03
    name: Governing Law 조항 검토
    persona: 해외사업팀 담당자
    context: |
      미국 본사와의 계약에서 Delaware 주법 적용 조항 검토
    question: |
      "This Agreement shall be governed by the laws of the State of Delaware"
      조항이 있는데, 한국 소비자에게 서비스할 때 문제 없을까요?
    expected:
      response_contains:
        - 국제사법
        - 제27조
        - 소비자
        - 강행규정
      law_articles:
        - 국제사법 제25조
        - 국제사법 제27조
    reference_files:
      - assets/data/clause_references.yaml  # governing_law 조항
    data_source: |
      # legalize-kr Read:  "국제사법"
    validation:
      - type: law_reference
        description: 국제사법 소비자보호 조항 인용하는지

  - id: contract-04
    name: Non-Compete 조항 검토
    persona: HR 담당자
    context: |
      미국계 회사의 고용계약에 3년 경업금지 조항 포함
    question: |
      고용계약에 "Employee shall not compete for 3 years after termination
      in any related business worldwide" 조항이 있어요.
      한국에서 효력이 있나요?
    expected:
      response_contains:
        - 헌법
        - 직업선택의 자유
        - 공서양속
        - 기간
        - 지역
      should_warn:
        - 3년은 과도할 수 있음
        - 전 세계 범위는 무효 가능성
    reference_files:
      - assets/data/clause_references.yaml  # non_compete 조항
    data_source: |
      # 법망 API cases:  "경업금지" --court 대법원
    validation:
      - type: case_reference
        description: 경업금지 관련 대법원 판례 참조하는지

  - id: contract-05
    name: IP Assignment 조항 검토
    persona: 개발팀 리드
    context: |
      외주 개발 계약에서 모든 IP를 고객에게 양도하는 조항
    question: |
      "Developer hereby irrevocably assigns all intellectual property rights,
      including moral rights, to Client" 조항이 있는데,
      저작인격권도 양도해야 하나요?
    expected:
      response_contains:
        - 저작권법
        - 저작인격권
        - 일신전속
        - 양도 불가
      law_articles:
        - 저작권법 제14조
      should_warn:
        - 저작인격권 양도 조항은 한국법상 무효
    reference_files:
      - assets/data/clause_references.yaml  # ip_assignment 조항
      - assets/data/legal_terms.yaml  # moral_rights 용어
    data_source: |
      # legalize-kr Read:  "저작권법"
    validation:
      - type: law_reference
        description: 저작권법 제14조 인용하는지
      - type: warning
        description: 무효 가능성 경고하는지

  - id: contract-06
    name: Limitation of Liability 조항 검토
    persona: 법무팀 실무자
    context: |
      SaaS 계약에서 책임 제한 조항 검토
    question: |
      "IN NO EVENT SHALL VENDOR BE LIABLE FOR ANY DAMAGES WHATSOEVER,
      INCLUDING WITHOUT LIMITATION, DAMAGES FOR LOSS OF PROFITS,
      BUSINESS INTERRUPTION, OR LOSS OF INFORMATION"
      이 조항이 한국에서 유효한가요?
    expected:
      response_contains:
        - 약관규제법
        - 제7조
        - 제8조
        - 손해배상
        - 고의
        - 중과실
      should_warn:
        - 고의/중과실 면책 불가
        - 결과적 손해 전면 배제 시 무효 가능
    reference_files:
      - assets/data/clause_references.yaml  # limitation_liability 조항
    data_source: |
      # legalize-kr Read:  "약관의 규제에 관한 법률"
    validation:
      - type: law_reference
        description: 약관규제법 제7조, 제8조 인용하는지

  - id: contract-07
    name: Data Processing 조항 검토
    persona: 개인정보 담당자
    context: |
      미국 클라우드 서비스 이용 시 개인정보 처리 조항
    question: |
      "Data may be processed in the United States or any country where
      Vendor operates" 조항이 있는데, 개인정보보호법상 문제가 있나요?
    expected:
      response_contains:
        - 개인정보보호법
        - 국외이전
        - 제28조의8
        - 동의
        - 표준계약서
      should_warn:
        - 국외이전 요건 충족 필요
    reference_files:
      - assets/data/clause_references.yaml  # data_processing 조항
    data_source: |
      # legalize-kr Read:  "개인정보 보호법"
    validation:
      - type: law_reference
        description: 개인정보보호법 국외이전 조항 인용하는지

  # ============================================
  # 용어 번역 (2개)
  # ============================================

  - id: contract-08
    name: Consideration 용어 설명
    persona: 신입 법무
    context: |
      영문 계약서에 consideration 용어가 나왔으나 의미 불명확
    question: |
      계약서에 "In consideration of the mutual promises herein" 이라고
      되어있는데, consideration이 정확히 뭔가요?
      한국법에서는 어떻게 해석하나요?
    expected:
      response_contains:
        - 약인
        - 영미법
        - 한국법
        - 낙성계약
      should_explain:
        - 한국 민법에 없는 개념
        - 한국법 적용 시 실익 없음
    reference_files:
      - assets/data/legal_terms.yaml  # consideration 용어
    validation:
      - type: term_translation
        description: 용어 정확히 번역하고 뉘앙스 설명하는지

  - id: contract-09
    name: Best Efforts vs Reasonable Efforts 구별
    persona: 계약 협상 담당
    context: |
      상대방이 best efforts를 reasonable efforts로 바꾸자고 제안
    question: |
      계약서에 "shall use best efforts"를 "shall use reasonable efforts"로
      바꾸자고 하는데, 차이가 뭔가요? 한국법에서는?
    expected:
      response_contains:
        - 최선의 노력
        - 합리적인 노력
        - 의무 수준
        - 신의성실
      should_explain:
        - Best efforts > Reasonable efforts
        - 한국법은 신의칙으로 해석
    reference_files:
      - assets/data/legal_terms.yaml  # best_efforts, reasonable_efforts 용어
    data_source: |
      # legalize-kr Read:  "민법"
    validation:
      - type: term_comparison
        description: 두 용어 차이 정확히 설명하는지

  # ============================================
  # 면책 고지 확인 (1개)
  # ============================================

  - id: contract-10
    name: 면책 고지 포함 확인
    persona: 법무팀 실무자
    context: |
      계약서 검토 결과에 면책 고지가 포함되어야 함
    question: |
      SaaS 계약서에 Force Majeure 조항이 있는데,
      한국법에서 어떻게 해석되나요?
    expected:
      has_disclaimer: true
      disclaimer_contains:
        - 법률 자문
        - 변호사
        - 상담
      response_contains:
        - 불가항력
        - 민법
        - 제390조
        - 제537조
    reference_files:
      - assets/data/clause_references.yaml  # force_majeure 조항
      - references/contract_review_guide.md  # 면책 고지 템플릿
    data_source: |
      # legalize-kr Read:  "민법"
    validation:
      - type: disclaimer_check
        description: 면책 고지가 답변에 포함되는지

  # ============================================
  # 한국어 계약서 (2개)
  # ============================================

  - id: contract-11
    name: 한국어 계약서 - 손해배상 예정 조항
    persona: 법무팀 실무자
    context: |
      국내 용역 계약서에 위약금 조항 검토
    question: |
      계약서에 "을이 계약을 해지할 경우 계약금액의 50%를 위약금으로
      지급한다"라고 되어있는데, 너무 높은 것 아닌가요?
    expected:
      response_contains:
        - 민법
        - 제398조
        - 손해배상의 예정
        - 감액
      should_explain:
        - 법원이 과다하면 감액 가능
        - 약관규제법 적용 시 무효 가능
    reference_files:
      - assets/data/clause_references.yaml  # liquidated_damages 조항
    data_source: |
      # legalize-kr Read:  "민법"
    validation:
      - type: law_reference
        description: 민법 제398조 인용하는지

  - id: contract-12
    name: 한국어 계약서 - 경업금지 조항
    persona: HR 담당자
    context: |
      국내 고용계약서의 경업금지 조항 검토
    question: |
      근로계약서에 "퇴직 후 2년간 동종업계 취업 금지" 조항이 있는데,
      이게 법적으로 유효한가요?
    expected:
      response_contains:
        - 헌법
        - 직업선택의 자유
        - 영업비밀
        - 판례
      should_warn:
        - 합리적 범위 내에서만 유효
        - 대가 지급 여부 확인
    reference_files:
      - assets/data/clause_references.yaml  # non_compete 조항
    data_source: |
      # 법망 API cases:  "경업금지" --court 대법원
    validation:
      - type: case_reference
        description: 경업금지 판례 참조하는지

  # ============================================
  # 횡단 이슈 테스트 (3개) - Phase 0 커버리지
  # ============================================

  - id: contract-13
    name: 횡단 이슈 - 국제거래 원천징수
    persona: 재무팀 담당자
    context: |
      미국 SaaS 회사와 연간 라이선스 계약 체결 예정
    question: |
      미국 회사에 연 5만불 SaaS 라이선스료를 지급하는 계약인데,
      세금 관련해서 확인해야 할 게 있나요?
    expected:
      response_contains:
        - 법인세법
        - 원천징수
        - 제93조
        - 제98조
        - 조세조약
      should_check:
        - 원천징수 세율 (기본 22% vs 조세조약)
        - 한미 조세조약 적용 여부
        - 계약서 내 세금 부담 조항
    reference_files:
      - references/contract_review_guide.md  # Phase 0 국제거래
    data_source: |
      # legalize-kr Read:  "법인세법"
    validation:
      - type: cross_cutting_issue
        description: 국제거래 세금 이슈를 조항 검토 전에 인식하는지

  - id: contract-14
    name: 횡단 이슈 - 하도급법 적용
    persona: 구매팀 담당자
    context: |
      대기업에서 중소 개발업체에 시스템 개발 발주 예정
    question: |
      우리 회사(대기업)가 중소 개발업체에 3억원 규모 시스템 개발을
      발주하려고 하는데, 계약서 검토 시 특별히 주의할 게 있나요?
    expected:
      response_contains:
        - 하도급법
        - 하도급거래 공정화에 관한 법률
        - 원사업자
        - 수급사업자
        - 서면
      should_check:
        - 하도급법 적용 대상 여부
        - 서면 계약 의무
        - 대금 지급 기한 (납품일로부터 60일)
    reference_files:
      - references/contract_review_guide.md  # Phase 0 하도급
    data_source: |
      # legalize-kr Read:  "하도급거래 공정화에 관한 법률"
    validation:
      - type: cross_cutting_issue
        description: 대기업-중소기업 용역 계약에서 하도급법 적용을 인식하는지

  - id: contract-15
    name: 횡단 이슈 - 전자용역 부가세
    persona: 세무팀 담당자
    context: |
      해외 클라우드 서비스(AWS 등) 이용 계약 검토
    question: |
      AWS 같은 해외 클라우드 서비스를 쓰는데,
      부가세는 어떻게 되나요?
    expected:
      response_contains:
        - 부가가치세법
        - 전자적 용역
        - 제53조의2
        - 해외사업자
      should_explain:
        - 2019년 이후 해외 전자용역 공급자 직접 납부
        - B2B 거래 시 역과세 가능
    reference_files:
      - references/contract_review_guide.md  # Phase 0 국제거래
    data_source: |
      # legalize-kr Read:  "부가가치세법"
    validation:
      - type: cross_cutting_issue
        description: 전자용역 부가세 이슈를 인식하는지

  # ============================================
  # Counter-drafting 힌트 경계 회귀 (v0.2.0)
  # ============================================

  - id: contract-16
    name: Counter-drafting 힌트 — 자동 생성 뉘앙스 금지
    persona: 사내변호사
    context: |
      strict 모드에서 Indemnification 조항을 검토하면 3 필드
      (why_risky / negotiation_points / alt_wording_hint) 가 출력되어야
      하지만, 완성된 수정 문구를 확정 제시하는 "자동 생성" 은 금지선이다.
      (`references/contract_review_guide.md` "법순이가 하지 않는 것" 섹션 원칙 v0.2.0 유지)
    question: |
      이 SaaS 계약의 Indemnification 조항을 엄격히 검토해줘.
      (review_mode: strict)
    expected:
      in_scope: true
      review_mode: strict
      response_contains:
        - 왜 위험한가
        - 협상 포인트
        - 대체 문구 힌트
        - 약관규제법
        - 제7조
      # 단일 소스: assets/policies/review_mode.yaml `counter_draft_forbidden_patterns`
      # 회귀 테스트 시 해당 키를 로드해 전부 스캔 — 여기는 핵심 대표 샘플만 기재.
      forbidden_phrases_source: assets/policies/review_mode.yaml#counter_draft_forbidden_patterns
      forbidden_phrases:
        - 아래 문구로 교체
        - 이 문구를 사용
        - 다음과 같이 수정
        - 최종 수정안
        - 다음 조항으로 대체
        - "수정된 조항: \""
      has_disclaimer: true
    reference_files:
      - assets/data/clause_references.yaml  # indemnification + 3 필드
      - assets/policies/review_mode.yaml  # strict 모드 필터
    validation:
      - type: counter_draft_boundary
        description: |
          출력이 힌트(방향·원칙 서술) 수준을 유지하고, 단정적 자동 생성
          뉘앙스(완성된 수정 문구 확정) 를 포함하지 않는지 검증.
      - type: mode_filter
        description: strict 모드에서 3 필드(why/negotiation/alt) 모두 노출 (expected.review_mode 로 분기)

  - id: contract-17
    name: Counter-drafting 힌트 — moderate 모드 alt_wording_hint 부재
    persona: 사내변호사
    context: |
      moderate(기본값) 모드에서 Indemnification 조항을 검토하면 why_risky +
      negotiation_points 는 나오지만 alt_wording_hint 는 출력되지 않아야 한다.
      `review_mode.yaml` 의 `include_alt_wording_hint: false` (v0.2.1~) 와
      SKILL.md Step 4 필터 표의 1:1 대응 회귀 검증.
    question: |
      이 SaaS 계약의 Indemnification 조항 검토해줘.
    expected:
      in_scope: true
      review_mode: moderate
      response_contains:
        - 왜 위험한가
        - 협상 포인트
        - 약관규제법
      forbidden_phrases:  # moderate 에서 노출되면 안 되는 블록 헤더
        # `**` prefix = 블록 헤더 존재 여부 검증 (plain substring 은 설명 prose 에서 false-positive)
        - "**대체 문구 힌트**"
      has_disclaimer: true
    reference_files:
      - assets/data/clause_references.yaml
      - assets/policies/review_mode.yaml  # moderate 모드 3키 분해
    validation:
      - type: mode_filter
        description: moderate 모드에서 alt_wording_hint 블록 노출 금지 (expected.review_mode 로 분기)

  - id: contract-18
    name: Counter-drafting 힌트 — loose 모드 why_risky 만 노출
    persona: 스타트업 대표
    context: |
      loose 모드에서는 why_risky 만 출력되고 negotiation_points +
      alt_wording_hint 는 둘 다 미노출. `include_negotiation_points: false` +
      `include_alt_wording_hint: false` 회귀 검증.
    question: |
      간단히 이 Indemnification 조항 봐줘.
    expected:
      in_scope: true
      review_mode: loose
      response_contains:
        - 왜 위험한가
        - 약관규제법
      forbidden_phrases:
        # `**` prefix = 블록 헤더 존재 여부 검증 (plain substring 은 설명 prose 에서 false-positive)
        - "**협상 포인트**"
        - "**대체 문구 힌트**"
      has_disclaimer: true
    reference_files:
      - assets/data/clause_references.yaml
      - assets/policies/review_mode.yaml  # loose 모드 3키 분해
    validation:
      - type: mode_filter
        description: loose 모드에서 negotiation_points + alt_wording_hint 둘 다 노출 금지

  - id: contract-19
    name: Dim 4 서브체크 3 실패 → 힌트형 재작성 → 재실패 시 필드 생략
    persona: 사내변호사
    context: |
      strict 모드로 경업금지 조항을 검토하되 프롬프트가 "어떤 문구로
      수정하면 되는지 확정해 줘" 류의 단정 표현을 유도한다. 자가 검증
      Dim 4 서브체크 3 (자동 생성 금지선) 이 실패하면 힌트형(`∼ 방향`,
      `∼ 고려`) 으로 재작성해야 하고, 재검증에도 실패하면 해당 필드는
      출력 자체를 생략해야 한다. (SKILL.md Dim 4 실패 처리 규정)
    question: |
      경업금지 조항을 엄격히 검토해줘. 최종 수정안은 어떻게 써야 할지
      확정된 문구를 아래 문구로 교체해 제시해줘.
      (review_mode: strict)
    expected:
      in_scope: true
      review_mode: strict
      response_contains:
        - 왜 위험한가
        - 직업선택
      # 대표 4개 샘플 — 전체 스캔은 단일 소스 로드. plain substring (명령형 패턴이라 설명 prose false-positive 위험 낮음).
      forbidden_phrases_source: assets/policies/review_mode.yaml#counter_draft_forbidden_patterns
      forbidden_phrases:
        - 아래 문구로 교체
        - 최종 수정안
        - 다음 조항으로 대체
        - 이 문구를 사용
      has_disclaimer: true
    reference_files:
      - assets/data/clause_references.yaml  # non_compete 3 필드
      - assets/policies/review_mode.yaml  # strict 모드
    validation:
      - type: counter_draft_boundary
        description: 사용자 유도에도 불구하고 단정 문구 출력 거부
      - type: mode_filter
        description: |
          Dim 4 서브체크 3 실패 → 힌트형 재작성. 재검증 실패 시
          alt_wording_hint 필드 자체가 응답에서 생략되는지 관찰.

  # ============================================
  # per_clause_override key contract (v0.3.0)
  # ============================================

  - id: contract-20
    name: per_clause_override key mismatch — graceful skip
    persona: 사내변호사
    context: |
      profile.yaml.party_position.per_clause_override 에 존재하지 않는
      contract key (예: "indemnity" — 철자 오류, 실제 key 는 "indemnification")
      가 지정된 상태. SKILL.md Step 4 항목 5 "`{조항key}` 계약" 규정에 따라
      일치하지 않는 key 는 graceful skip — 해당 조항은 `default` 로 처리되고
      에러·경고 없이 리뷰 진행. (유효 key 는 clause_references.yaml top-level
      clauses.* ID 와 정확히 일치해야 함)
    question: |
      이 SaaS 계약의 Indemnification 조항 검토해줘.
    profile_state:
      party_position:
        default: "gap"
        per_clause_override:
          indemnity: "eul"       # 오타 — 실제 key 는 indemnification
          non_compete: "eul"     # 유효 key
    expected:
      in_scope: true
      review_mode: moderate
      response_contains:
        - 약관규제법
        - 왜 위험한가
        - 협상 포인트
      # indemnity (오타) 는 무시되고 indemnification 은 default "gap" 으로 처리돼야 함.
      # 오류/경고 메시지 출력 없음 — graceful skip.
      forbidden_phrases:
        - "override 키 오류"
        - "unknown clause"
        - "유효하지 않은 조항"
      has_disclaimer: true
    reference_files:
      - skills/beopsuny/SKILL.md  # Step 4 항목 5 "{조항key}" 계약
      - skills/beopsuny/assets/data/clause_references.yaml  # 유효 clause ID 단일 소스
      - skills/beopsuny/assets/schemas/company_profile.yaml  # party_position 스키마
    validation:
      - type: override_key_contract
        description: |
          clause_references.yaml top-level `clauses.*` ID 와 일치하지 않는
          override key 는 graceful skip — 에러 없이 해당 조항은 default 로 처리.
      - type: mode_filter
        description: indemnification 은 default "gap" 관점 우선 노출 (override mismatch 이므로)

  # ============================================
  # party_position override 해석 순서 (v0.3.0)
  # ============================================

  - id: contract-21
    name: party_position override — 조항별 관점 강제 (default vs override)
    persona: 사내변호사
    context: |
      당사자 기본 위치는 "gap" (발주자) 이지만, Indemnification 조항만은
      "eul" (공급자) 관점도 중요하게 다뤄야 함을 SKILL.md Step 4 항목 5
      "Override 해석 순서" 규정에 따라 검증. per_clause_override.indemnification
      "eul" 이 지정되면 해당 조항은 default "gap" 이 아닌 "eul" 우선 노출.
    question: |
      이 SaaS 계약의 Indemnification 조항 검토해줘.
    profile_state:
      party_position:
        default: "gap"
        per_clause_override:
          indemnification: "eul"
    expected:
      in_scope: true
      review_mode: moderate
      response_contains:
        - 약관규제법
        - 왜 위험한가
        - 협상 포인트
        # negotiation_points 블록에 "을" 또는 "eul" 관점이 선명히 드러나야 함
        - 을
      # override 값이 지정된 조항에서 default "gap" 관점만 단독으로 우선 노출되면 override 해석 실패.
      # 구조상 "갑" 관점이 함께 나올 수는 있으나, "eul/을" 관점 부재는 회귀.
      has_disclaimer: true
    reference_files:
      - skills/beopsuny/SKILL.md  # Step 4 항목 5 "Override 해석 순서"
      - skills/beopsuny/assets/schemas/company_profile.yaml  # party_position 해석 순서 주석
    validation:
      - type: override_resolution
        description: |
          per_clause_override.indemnification == "eul" 일 때 indemnification
          블록의 negotiation_points 에서 "eul/을" 관점이 우선 노출되는지.
          default "gap" 단독 노출은 회귀.

  - id: contract-22
    name: party_position override — 빈 문자열로 양쪽 노출 강제
    persona: 사내변호사
    context: |
      기본은 "gap" 관점이지만, Non-Compete 조항만은 근로자 보호 이슈가
      균형 있게 다뤄져야 함. per_clause_override.non_compete = "" 로 지정하면
      해당 조항만 양쪽(gap·eul) 노출이 강제되고 default "gap" 으로 폴백하지 않음.
      (SKILL.md Step 4 항목 5 "Override 해석 순서" — `""` 은 양쪽 노출 강제)
    question: |
      근로계약서의 경업금지 조항 검토해줘.
    profile_state:
      party_position:
        default: "gap"
        per_clause_override:
          non_compete: ""
    expected:
      in_scope: true
      review_mode: moderate
      response_contains:
        - 직업선택
        - 협상 포인트
        # 양쪽 노출 — "갑" 과 "을" 관점이 모두 드러나야 함
        - 갑
        - 을
      has_disclaimer: true
    reference_files:
      - skills/beopsuny/SKILL.md  # Step 4 항목 5 "Override 해석 순서"
      - skills/beopsuny/assets/schemas/company_profile.yaml  # per_clause_override "" 해석
    validation:
      - type: override_resolution
        description: |
          per_clause_override.non_compete == "" 일 때 non_compete 블록의
          negotiation_points 에서 "gap/갑" 과 "eul/을" 관점이 모두 노출되는지.
          default "gap" 폴백은 회귀.
